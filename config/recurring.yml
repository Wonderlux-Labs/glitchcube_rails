default: &default
  conversation_timeout_monitor:
    class: Recurring::System::ConversationTimeoutMonitorJob
    schedule: every minute
    queue: default

  weather_forecast_update:
    class: Recurring::Content::WeatherForecastSummarizerJob
    schedule: "0 * * * *"     # Every hour at the top of the hour
    queue: default

  random_persona:
    class: Recurring::Persona::RandomPersonaJob
    schedule: "*/5 * * * *"   # Check every 5 min; switches once a 30–90 min interval elapses
    queue: default

  interaction_summary:
    class: Recurring::Memory::SummarizerJob
    schedule: "*/10 * * * *"  # Every 10 min — rolling "running memory" summary
    queue: default

  overall_summary:
    class: Recurring::Memory::OverallSummarizerJob
    schedule: "5 * * * *"     # Hourly (:05) — fold interaction summaries into the one overall
    queue: default

production:
  <<: *default

  # Production-specific jobs
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  host_registration:
    class: Recurring::System::HostRegistrationJob
    schedule: "*/5 * * * *"   # Every 5 minutes
    queue: default

development:
  <<: *default

  host_registration:
    class: Recurring::System::HostRegistrationJob
    schedule: "*/3 * * * *"   # Every 3 minutes in dev (faster)
    queue: default
