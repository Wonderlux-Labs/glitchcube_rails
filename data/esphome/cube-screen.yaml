# M5Stack Core2 — GlitchCube status screen.
#
# A minimal ESPHome config that (1) exposes the Core2's on-board sensors to Home
# Assistant and (2) shows whatever text HA puts in `input_text.m5_screen_text` on
# the LCD. Push text from HA with:  input_text.set_value → input_text.m5_screen_text
#
# THE ONE GOTCHA: the Core2's LCD, backlight and touch are all powered through an
# AXP192 PMU on the internal I2C bus. Nothing lights up until that chip is set up,
# and ESPHome has no built-in AXP192 driver — hence the external component below
# (model: M5CORE2 handles the whole power-rail + backlight init). Pin map (SPI +
# I2C + display CS/DC) is the stock Core2 wiring; see the martydingo sample config.
#
# Build & flash (esphome 2026.6.x is installed on this machine):
#   esphome config  data/esphome/cube-screen.yaml                 # validate
#   esphome run     data/esphome/cube-screen.yaml --device 192.168.68.66   # compile + OTA
# First compile pulls the ESP32 toolchain (~10-20 min); later builds are quick.

substitutions:
  name: cube-screen
  friendly_name: Cube Screen

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  # LCD BRING-UP. Confirmed on this unit: DCDC3 (backlight) + LDO2 (panel logic) power ON
  # but the panel stays black because martydingo never releases the LCD RESET line — on the
  # M5Core2 that reset is AXP192 GPIO4 (reg 0x96 bit 0x02), configured via reg 0x95. Held in
  # reset, the ILI9342C ignores every SPI init write => black. We MUST release it BEFORE the
  # display driver runs its init. Setup order is i2c bus (1000) -> display (HARDWARE=800) ->
  # axp192 (DATA=600), so this runs at IO priority 900: bus is up, display/axp192 are not.
  # We power the panel + backlight ourselves here (axp192.setup() hasn't run yet) and pulse
  # the reset. martydingo's later setup re-asserts the same rails and never touches 0x96.
  on_boot:
    priority: 900
    then:
      - lambda: |-
          auto *ax = id(axp192_id);
          uint8_t v = 0;
          // Panel logic power (LDO2 bit2) + backlight (DCDC3 bit1) ON; motor (LDO3 bit3) OFF.
          ax->read_byte(0x12, &v); ax->write_byte(0x12, (v | 0x06) & ~0x08);
          ax->write_byte(0x27, 0xe0);                        // DCDC3 backlight ~3.1V
          ax->read_byte(0x28, &v); ax->write_byte(0x28, (v & 0x0f) | 0xf0);  // LDO2 = 3.3V
          // Configure AXP192 GPIO4 as output (LCD reset), per M5Stack AXP192::begin().
          ax->read_byte(0x95, &v); ax->write_byte(0x95, (v & 0x72) | 0x84);
          // Pulse LCD reset: low 120ms, then release high 120ms (reg 0x96 bit 0x02).
          ax->read_byte(0x96, &v); ax->write_byte(0x96, v & ~0x02);
          delay(120);
          ax->read_byte(0x96, &v); ax->write_byte(0x96, v | 0x02);
          delay(120);
          ESP_LOGI("m5_lcd", "panel powered + LCD reset released (AXP192 GPIO4) before display init");

esp32:
  board: m5stack-core-esp32
  framework:
    type: arduino

# The Core2 has 4MB PSRAM — REQUIRED here so the 150KB (320x240x16bit) display
# framebuffer allocates. Without it the display inits then dies with
# "Failed to init Memory" because internal DRAM can't spare a contiguous 150KB.
psram:

# AXP192 power-management driver — REQUIRED, this is what turns the LCD on.
external_components:
  - source: github://martydingo/esphome-axp192@master
    components: [axp192]
    refresh: 1d

logger:

# Native API for Home Assistant. New encryption key (in secrets.yaml) → after the
# first flash HA will show this device as needing to be (re-)added; adopt it and
# paste the key. WiFi creds are compiled into the firmware (ESPHome doesn't carry
# them across a firmware replacement), so they must be present here.
api:
  encryption:
    key: !secret api_encryption_key

# No OTA password: matches the passwordless dashboard firmware currently running,
# so this first OTA authenticates. Add `password:` later once it's on this config.
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

# --- Buses ------------------------------------------------------------------------
# Internal I2C carries the AXP192 (0x34), MPU6886 IMU (0x68) and RTC. SPI drives the
# ILI9342C LCD. These are the fixed Core2 pins.
i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22
    scan: true

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO38

# --- Text pushed from Home Assistant ----------------------------------------------
globals:
  - id: screen_text
    type: std::string
    restore_value: no
    initial_value: '"GlitchCube"'
  - id: screen_emoji
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: screen_color
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: screen_blank
    type: bool
    restore_value: no
    initial_value: 'false'

binary_sensor:
  # Blank / clear the screen from HA without wiping the stored text + emoji.
  - platform: homeassistant
    id: ha_screen_blank
    entity_id: input_boolean.m5_screen_blank
    on_state:
      - lambda: 'id(screen_blank) = x;'
      - component.update: m5_display

text_sensor:
  # Caption text. When an emoji is set this becomes a small line under it.
  - platform: homeassistant
    id: ha_screen_text
    entity_id: input_text.m5_screen_text
    on_value:
      - lambda: 'id(screen_text) = x;'
      - component.update: m5_display
  # A single emoji reflecting the cube's mood, drawn large + centered.
  - platform: homeassistant
    id: ha_screen_emoji
    entity_id: input_text.m5_screen_emoji
    on_value:
      - lambda: 'id(screen_emoji) = x;'
      - component.update: m5_display
  # Background colour — a name (red/green/blue/yellow/orange/purple/cyan/pink/white)
  # or "#RRGGBB". Blank or unknown = black. Doubles as a colour badge when text/emoji
  # are empty (or m5_screen_blank is on).
  - platform: homeassistant
    id: ha_screen_color
    entity_id: input_text.m5_screen_color
    on_value:
      - lambda: 'id(screen_color) = x;'
      - component.update: m5_display
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"

# --- Fonts ------------------------------------------------------------------------
# gfonts:// are fetched at compile time — no local font files needed.
font:
  - file: "gfonts://Roboto@700"
    id: font_title
    size: 26
  - file: "gfonts://Roboto"
    id: font_body
    size: 20
  # Monochrome Noto Emoji, rendered big for the mood glyph. Only the codepoints
  # listed here get baked into flash — an emoji sent from HA that isn't in this
  # list just draws blank (and logs "Codepoint … not found"), so add any you want.
  - file: "gfonts://Noto Emoji"
    id: font_emoji
    size: 130
    bpp: 4
    glyphs:
      ["😀","😃","😄","😁","😆","😅","😂","🙂","😉","😊","😎","🥳","😍","🤩",
       "😜","🤪","😏","😝","🤭","🥰","😐","🤔","🧐","😶","🙄","😌","😴","🥱",
       "😢","😭","😔","😟","🙁","😞","😠","😡","🤬","😤","😮","😲","😱","😨",
       "🤯","🤒","🤢","😈","👿","🤖","👻","👽","💀","🔥","✨","⭐","💯","⚡",
       "🧡","💛","💚","💙","💜"]

# --- Display ----------------------------------------------------------------------
# model: M5STACK == the 320x240 ILI9342C on the Core2. If colours look inverted on
# hardware, add `invert_colors: true` (or false) here.
display:
  - platform: ili9xxx
    model: M5STACK
    id: m5_display
    invert_colors: true      # Core2's ILI9342C; flip to false if colours look wrong
    cs_pin: GPIO5
    dc_pin: GPIO15
    update_interval: 1s
    lambda: |-
      // Background colour from HA (name or #RRGGBB); blank/unknown => black.
      auto to_color = [](const std::string &s) -> Color {
        if (s.size() == 7 && s[0] == '#') {
          auto hx = [&](int i) -> uint8_t { return (uint8_t) strtol(s.substr(i, 2).c_str(), nullptr, 16); };
          return Color(hx(1), hx(3), hx(5));
        }
        if (s == "red")     return Color(0xE0, 0x20, 0x20);
        if (s == "green")   return Color(0x20, 0xC0, 0x20);
        if (s == "blue")    return Color(0x20, 0x40, 0xE0);
        if (s == "yellow")  return Color(0xF0, 0xD0, 0x10);
        if (s == "orange")  return Color(0xF0, 0x80, 0x00);
        if (s == "purple")  return Color(0x90, 0x20, 0xE0);
        if (s == "cyan")    return Color(0x00, 0xC0, 0xF0);
        if (s == "pink" || s == "magenta") return Color(0xF0, 0x30, 0xB0);
        if (s == "white")   return Color(0xF0, 0xF0, 0xF0);
        return Color::BLACK;
      };
      Color bg = to_color(id(screen_color));
      it.fill(bg);
      if (id(screen_blank)) return;   // cleared / colour-badge mode: just the background

      // Foreground auto-picks black or white for contrast against the background.
      uint16_t lum = (bg.r * 299 + bg.g * 587 + bg.b * 114) / 1000;
      Color fg = lum > 140 ? Color::BLACK : Color(0xFF, 0xFF, 0xFF);

      const std::string &emoji = id(screen_emoji);
      const std::string &text = id(screen_text);

      if (!emoji.empty()) {
        // Mood mode: one big emoji centred, text as a caption strip along the bottom.
        it.print(160, 104, id(font_emoji), fg, TextAlign::CENTER, emoji.c_str());
        if (!text.empty())
          it.print(160, 232, id(font_body), fg, TextAlign::BOTTOM_CENTER, text.c_str());
        return;
      }

      // Text mode: "GlitchCube" header + word-wrapped body.
      it.print(160, 6, id(font_title), fg, TextAlign::TOP_CENTER, "GlitchCube");
      const int max_w = 300;
      const int line_h = 26;
      int y = 48;
      std::string line;
      size_t i = 0;
      while (true) {
        size_t sp = text.find(' ', i);
        std::string word = (sp == std::string::npos) ? text.substr(i) : text.substr(i, sp - i);
        std::string candidate = line.empty() ? word : line + " " + word;
        int x1, y1, w, h;
        it.get_text_bounds(0, 0, candidate.c_str(), id(font_body), TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
        if (w > max_w && !line.empty()) {
          it.print(10, y, id(font_body), fg, line.c_str());
          y += line_h;
          line = word;
        } else {
          line = candidate;
        }
        if (sp == std::string::npos) break;
        i = sp + 1;
      }
      if (!line.empty()) it.print(10, y, id(font_body), fg, line.c_str());

# --- Sensors ----------------------------------------------------------------------
sensor:
  # AXP192 must be present or the LCD stays dark. brightness sets the backlight.
  - platform: axp192
    model: M5CORE2
    id: axp192_id
    address: 0x34
    i2c_id: bus_a
    update_interval: 30s
    # Backlight LEVEL (DCDC3 voltage). NOTE: this only has any visible effect once the
    # DCDC3 output is actually ENABLED — which martydingo forgets to do; see the on_boot
    # fix at the top of this file. With that in place, this sets how bright. Tune to taste.
    brightness: 100%
    battery_level:
      name: "Battery Level"
  - platform: mpu6886
    address: 0x68
    i2c_id: bus_a
    update_interval: 1s
    accel_x:
      name: "Accel X"
    accel_y:
      name: "Accel Y"
    accel_z:
      name: "Accel Z"
    gyro_x:
      name: "Gyro X"
    gyro_y:
      name: "Gyro Y"
    gyro_z:
      name: "Gyro Z"
    temperature:
      name: "IMU Temperature"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
