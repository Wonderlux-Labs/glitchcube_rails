- id: '1755313710558'
  alias: Persona Switcher
  description: Switches Assist pipeline when persona changes
  triggers:
  - trigger: state
    entity_id:
    - input_select.current_persona
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.current_persona
        state: buddy
      sequence:
      - action: select.select_option
        data:
          option: buddy-glitch
        target:
          entity_id: select.cube_cube_voice_assistant
    - conditions:
      - condition: state
        entity_id: input_select.current_persona
        state: jax
      sequence:
      - action: select.select_option
        data:
          option: jax-glitch
        target:
          entity_id: select.cube_cube_voice_assistant
    - conditions:
      - condition: state
        entity_id: input_select.current_persona
        state: neon
      sequence:
      - action: select.select_option
        data:
          option: neon-glitch
        target:
          entity_id: select.cube_cube_voice_assistant
    default:
    - action: select.select_option
      data:
        option: preferred
      target:
        entity_id: select.cube_cube_voice_assistant
  mode: single
