awtrix_marquee_message:
  alias: AWTRIX Marquee Message
  description: Flash a message across the cube's LED marquee sign. Only `message`
    is required — optionally give it a `color` (hex like "#FF00AA"), turn on `rainbow`
    text, or set how many seconds it shows (`duration`). It interrupts the sign to
    show your text, then returns to the normal display.
  fields:
    message:
      name: Message
      description: The text to scroll across the marquee (keep it under ~255 chars)
      required: true
      example: JAX DOESN'T PLAY THAT
      selector:
        text:
    color:
      name: Color
      description: Optional text color as a hex string, e.g. "#FF00AA". Ignored when
        rainbow is on.
      required: false
      selector:
        text:
    rainbow:
      name: Rainbow
      description: Rainbow-cycle the text color (overrides color)
      required: false
      default: false
      selector:
        boolean:
    duration:
      name: Duration
      description: Seconds to display before returning to the normal loop
      required: false
      default: 20
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: s
    icon:
      name: Icon
      description: 'Optional AWTRIX icon ID (a number, as a string) shown to the LEFT
        of the text. Use one only occasionally, when it genuinely fits the moment
        — most messages need no icon. Some good ones to reach for: smile 87, heart
        61, matrix 653, warning 555, lightning 95, fireworks 4353, skull 148, lightbulb
        2448, angry 72120, sleepy 71431, question 30710, exclamation 6134, dance 4128.
        Omit for no icon.'
      required: false
      selector:
        text:
    repeat:
      name: Repeat
      description: How many times the notification scrolls before it dismisses. Defaults
        to 2.
      required: false
      default: 2
      selector:
        number:
          min: 1
          max: 10
  sequence:
  - variables:
      prev_bri: "{{ state_attr('light.cube_awtrix_marquee_matrix', 'brightness') |
        int(255) }}"
      dur: "{{ (duration | default(20, true)) | int }}"
      rep: "{{ (repeat | default(2, true)) | int }}"
      notify_payload: '{% set p = {"text": message, "duration": dur, "repeat": rep}
        %} {% if rainbow | default(false, true) %}{% set p = p | combine({"rainbow":
        true}) %} {% elif color | default('''', true) %}{% set p = p | combine({"color":
        color}) %}{% endif %} {% if icon | default('''', true) %}{% set p = p | combine({"icon":
        icon | string}) %}{% endif %} {{ p | to_json }}'
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: '{"BRI": 255}'
  - action: mqtt.publish
    data:
      topic: marquee/notify
      payload: "{{ notify_payload | trim }}"
  - action: script.turn_on
    target:
      entity_id: script.awtrix_marquee_restore_brightness
    data:
      variables:
        prev_bri: "{{ prev_bri }}"
        dur: "{{ dur }}"
  mode: queued
  max: 5
awtrix_marquee_restore_brightness:
  alias: AWTRIX Marquee Restore Brightness
  description: Internal tail for awtrix_marquee_message. After a message's duration
    elapses, restore the marquee to its pre-message (idle) brightness. Fired non-blocking
    via script.turn_on so the message script returns immediately. Not for Assist —
    no agent should call this.
  fields:
    prev_bri:
      name: Previous brightness
      description: Brightness (0-255) to restore after the message.
      required: true
      selector:
        number:
          min: 0
          max: 255
    dur:
      name: Duration
      description: Message duration in seconds (the tail waits this + 1s before restoring).
      required: true
      selector:
        number:
          min: 1
          max: 120
  sequence:
  - delay: "{{ (dur | default(20, true)) | int + 1 }}"
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: "{{ {'BRI': prev_bri | int(255)} | to_json }}"
  mode: parallel
  max: 10
awtrix_marquee_clear:
  alias: AWTRIX Marquee Clear
  description: Clear/dismiss the current message on the cube's LED marquee sign, returning
    it to its normal display.
  sequence:
  - action: mqtt.publish
    data:
      topic: marquee/notify/dismiss
      payload: ''
  mode: single
set_marquee_idle:
  alias: Set Marquee Idle Effect
  description: 'Set the marquee''s always-on "idle" screen to an effect (the only
    thing shown besides notifications). Call with no args for a random ambient effect
    + random palette + random speed (3-5); or pass any of effect/palette/speed/blend/brightness
    to pin a look. Great for tuning in Developer Tools → Actions: play until a combo
    looks best, then put that combo in an automation. Publishes to marquee/custom/idle
    over MQTT, retained. Sets a per-app display time (duration:15s) — SHORTER than the
    wakehint text (30s) so the loop favors the words (per-app duration overrides the global
    ATIME cycle time).'
  fields:
    effect:
      name: Effect
      description: Effect name. Omit for a random ambient effect.
      required: false
      selector:
        select:
          options:
          - Fade
          - MovingLine
          - BrickBreaker
          - PingPong
          - Radar
          - Checkerboard
          - Fireworks
          - PlasmaCloud
          - Ripple
          - Snake
          - Pacifica
          - TheaterChase
          - Plasma
          - Matrix
          - SwirlIn
          - SwirlOut
          - LookingEyes
          - TwinklingStars
          - ColorWaves
    palette:
      name: Palette
      description: Color palette. Omit for a random palette.
      required: false
      selector:
        select:
          options:
          - Rainbow
          - Cloud
          - Ocean
          - Forest
          - Party
          - Lava
          - Heat
    speed:
      name: Speed
      description: 1-8, higher = faster. Omit for a random 3-5.
      required: false
      selector:
        number:
          min: 1
          max: 8
          mode: box
    blend:
      name: Blend
      description: Blend the palette across the effect.
      required: false
      selector:
        boolean:
    brightness:
      name: Brightness
      description: Global matrix brightness 0-255. Omit to leave unchanged.
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: slider
  sequence:
  - variables:
      ambient_pool:
      - PingPong
      - Matrix
      - Radar
      - TwinklingStars
      - MovingLine
      - Snake
      - BrickBreaker
      - TheaterChase
      - LookingEyes
      palette_pool:
      - Rainbow
      - Cloud
      - Ocean
      - Forest
      - Party
      - Lava
      - Heat
      eff: "{{ effect | default(ambient_pool | random, true) }}"
      pal: "{{ palette | default(palette_pool | random, true) }}"
      spd: "{{ (speed | default(range(3, 6) | random, true)) | int }}"
      bln: "{{ blend | default(true) }}"
  - if: "{{ brightness is defined and brightness not in [none, ''] }}"
    then:
    - action: mqtt.publish
      data:
        topic: marquee/settings
        payload: "{{ {'BRI': brightness | int} | to_json }}"
  - action: mqtt.publish
    data:
      topic: marquee/custom/idle
      retain: true
      payload: "{{ {'effect': eff, 'duration': 15, 'effectSettings': {'speed': spd, 'palette': pal,
        'blend': bln}} | to_json }}"
  mode: queued
  max: 10
set_marquee_wakehint:
  alias: Set Marquee Wake Hint
  description: Set the marquee's always-on "wakehint" app — the "say Hey Glitchcube
    to wake me up" hint the device cycles with the idle effect. Call with no args
    for a random phrase from the pool in RAINBOW text. Pass `message` to pin the text
    and/or `color` (hex) to pin a solid color instead of rainbow. Text scrolls a bit
    slower than default (scrollSpeed 50%) so it's easy to read (a long phrase may not
    finish before the app switches — that's fine). Always publishes effect:'' so a stray
    effect (e.g. a leaked busy-mode effect) is cleared and the words never render over an
    effect. Sets a per-app display time (duration:30s) — LONGER than the idle effect's 15s
    so the loop dwells on the words (per-app duration overrides the global ATIME cycle
    time). Publishes to marquee/custom/wakehint over MQTT, retained.
  fields:
    message:
      name: Message
      description: Wake-hint text. Omit for a random phrase from the pool.
      required: false
      selector:
        text:
    color:
      name: Color
      description: Pin a solid text color as a hex string, e.g. "#FF0000". Omit for
        rainbow.
      required: false
      selector:
        text:
  sequence:
  - variables:
      phrase_pool:
      - SAY 'HEY GLITCH CUBE' TO WAKE ME UP!
      - TALK TO ME! SAY 'HEY GLITCHCUBE' LOUD AND PROUD
      - OR TRY 'YO CUBE' - TALK TO ME!
      - SAY 'HEY GLITCH CUBE'
      - SAY 'YO CUBE'
      - WAKE UP BY SAYING 'HEY GLITCH CUBE'
      text: "{{ message | default('', true) or (phrase_pool | random) }}"
  - variables:
      payload: "{%- set p = {'text': text, 'scrollSpeed': 50, 'effect': '', 'duration': 30} -%} {%- if color | default('',
        true) -%}{%- set p = p | combine({'color': color}) -%} {%- else -%}{%- set
        p = p | combine({'rainbow': true}) -%}{%- endif -%} {{ p | to_json }}"
  - action: mqtt.publish
    data:
      topic: marquee/custom/wakehint
      retain: true
      payload: "{{ payload | trim }}"
  mode: queued
  max: 10
awtrix_install_idle_apps:
  alias: AWTRIX Seed Idle Apps
  description: 'Post-reflash seed for the marquee. The loop has TWO always-on custom
    apps that the device auto-cycles: "idle" (ambient effect) and "wakehint" (the
    say-Hey-Glitchcube hint). Turn app transitions ON (ATRANS) and set the cycle time
    (ATIME=20, in SECONDS on this firmware — NOT ms) — both device settings wiped
    by a reflash — so the two apps toggle every ~20 seconds; then seed both apps.
    Notifications (awtrix_marquee_message) still overlay whichever app is showing.
    Run once after a reflash; the idle-effect + wakehint cycle automations take over
    from there.'
  sequence:
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: '{"ATRANS": true, "ATIME": 20}'
  # Scrub any stray transient busyfx effect app (retain:true clears a lingering retained
  # one too) so a reseed while idle always lands on a clean idle+wakehint loop.
  - action: mqtt.publish
    data:
      topic: marquee/custom/busyfx
      payload: ''
      retain: true
  - action: script.set_marquee_idle
    data:
      effect: Matrix
      palette: Ocean
      speed: 4
  - action: script.set_marquee_wakehint
    data: {}
  mode: single
set_persona_quick:
  alias: Set Persona (quick)
  description: Quietly switch the cube's active persona — no fanfare, just change
    who's in charge. Give a `persona`, or omit it to pick a random one (never the
    current persona).
  fields:
    persona:
      name: Persona
      description: Which persona to switch to. Omit for a random pick.
      required: false
      example: buddy
      selector:
        select:
          options:
          - buddy
          - jax
          - zorp
          - crash
          - neon
  sequence:
  - variables:
      target: |-
        {{ persona | default('', true) or
           (state_attr('input_select.current_persona', 'options')
            | reject('eq', states('input_select.current_persona')) | list | random) }}
  - action: input_select.select_option
    target:
      entity_id: input_select.current_persona
    data:
      option: "{{ target }}"
  - action: script.awtrix_marquee_message
    data:
      message: "{{ target | upper }}"
      duration: 8
  mode: single
hand_off_the_cube:
  alias: Hand Off The Cube (grand entrance)
  description: Hand the cube to another persona, who takes over with a full grand
    entrance. Give a `persona` to name who takes over, or omit it for a random pick.
  fields:
    persona:
      name: Persona
      description: Which persona takes over the cube. Omit for a random pick.
      required: false
      example: neon
      selector:
        select:
          options:
          - buddy
          - jax
          - zorp
          - crash
          - neon
  sequence:
  - action: rest_command.glitchcube_grand_entrance
    data:
      persona: "{{ persona | default('', true) }}"
  mode: single
