sync_lights_to_persona:
  alias: Sync Lights To Persona
  description: Set the body WLED strip (solid) and the Voice PE LED ring to the current
    persona's signature color. Called by the Persona Switcher automation; safe to
    call manually to re-assert the persona look.
  sequence:
  - variables:
      rgb: |-
        {{ {'buddy': [255,220,0], 'neon': [255,0,128], 'zorp': [160,0,255],
            'crash': [0,255,65], 'jax': [0,120,255]}
           .get(states('input_select.current_persona'), [255,255,255]) }}
  - action: light.turn_on
    target:
      entity_id: light.cube_body_wled
    data:
      rgb_color: "{{ rgb }}"
      brightness: 180
      effect: Solid
  - action: light.turn_on
    target:
      entity_id: light.cube_cube_voice_led_ring
    data:
      rgb_color: "{{ rgb }}"
      brightness: 255
  mode: single
set_top_light_persona_color:
  alias: Set Top Light to Persona Color
  description: 'Internal helper: put the current persona''s signature color on the
    Govee top light as a solid, dim (brightness 15) ambient glow. Not for Assist —
    the top light is not exposed. This is the canonical "back to normal" path: it
    FIRST turns the device music-mode switch OFF (the built-in Spectrum/Rolling/etc.
    reactive modes need it on, and a solid color won''t stick while it''s on), then
    sets the color — so every revert must go through here.'
  sequence:
  - action: switch.turn_off
    target:
      entity_id: switch.cube_light_music_mode
  - action: light.turn_on
    target:
      entity_id: light.top_light
    data:
      brightness: 15
      rgb_color: |-
        {{ {'buddy': [255,220,0], 'neon': [255,0,128], 'zorp': [160,0,255],
            'crash': [0,255,65], 'jax': [0,120,255]}
           .get(states('input_select.current_persona'), [255,255,255]) }}
  mode: single
set_top_light_effect:
  alias: Set Top Light Effect
  description: 'Put a preset look on the Govee top light, chosen from the device''s
    full catalog. Good general moods: Sunset/Sunset Glow (warm, cozy), Aurora/Dreamland/Soothing
    (calm, dreamy), Fire (intense flicker), Ocean/Lake/Wave (cool, serene), Rainbow/Joyful
    (playful), Firefly/Starry Sky (gentle sparkle), Mysterious/Poison (eerie). Seasonal/
    holiday looks (Christmas*, Halloween, Ghost, Valentine''s Day…) and planet themes
    (Mars, Jupiter, Milky Way) are in here too. Custom DIY looks: "Cyberpunk"/"Acid"
    are glitchy neon, "A vintage lava lamp"/"Slow Rainbow" are slow retro drifts,
    "Forest Rave" is frenetic. For a plain solid color, set the light directly instead
    of using this.'
  fields:
    effect:
      name: Effect
      description: Which look to run — a built-in scene or a DIY scene, all in one
        list.
      required: true
      selector:
        select:
          options:
          - Sunrise
          - Sunset
          - Rainbow
          - Sunset Glow
          - Aurora
          - Forest
          - Ocean
          - Wave
          - Snow flake
          - Spring Wind
          - Sky
          - Firefly
          - Fire
          - Falling Petals
          - Cherry blossoms
          - Raining
          - Desert
          - Karst Cave
          - Mountain Forest
          - Feather
          - Spring
          - Summer
          - Fall
          - Winter
          - Lake
          - White Light
          - Reading
          - Night Light
          - Morning
          - Afternoon
          - Leisure
          - Refreshing
          - Fish tank
          - Goldfish
          - Train
          - Kitchen Aromas
          - Breathe
          - Gradient
          - Graffiti
          - Dreamlike
