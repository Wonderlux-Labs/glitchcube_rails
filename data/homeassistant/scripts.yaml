# --- Top light preset effects ----------------------------------------------------
# INTERNAL ONLY — the top light is NOT exposed to Voice Assist; Assist controls the WLED
# body/head segments instead. These scripts and the top-light automations are the only
# things that drive it.
# The top light (light.top_light, a govee2mqtt device that now sits on top of the cube)
# is set directly for solid colors/brightness — e.g. script.set_top_light_persona_color
# for the persona ambient glow. Its companion scene selects kept their original ids
# (select.cube_light_scene / select.cube_light_diy_scene / select.cube_light_music_mode);
# renaming the light entity does not rename them. Two convenience scripts pick named looks:
#   set_top_light_effect        -> static scenes: the full built-in catalog (~97) plus the
#                                  non-reactive DIY scenes. Built-in ones route through
#                                  select.cube_light_scene, DIY ones through
#                                  select.cube_light_diy_scene. (Rails shows call this for
#                                  the grand-entrance glitch beat; slated to move to the
#                                  automation layer later.)
#   set_music_reactive_lighting -> the sound-reactive DIY scenes only (they pulse to audio
#                                  on their own). Called with no effect it picks one at
#                                  random. The "Top light: sound-reactive with jukebox"
#                                  automation calls it while the jukebox plays. The device's
#                                  old built-in "music mode" switch is left untouched.

# Set the top light to the current persona's signature color, solid, dimmed to a low
# ambient level (brightness 15) — the top light's default ambient glow. Central home for the persona->RGB map (mirrors the
# voice LED ring colors in the Persona Switcher automation); called by that automation, by
# the sound-reactive-jukebox revert, and by the blink-test restore.
set_top_light_persona_color:
  alias: Set Top Light to Persona Color
  description: >-
    Internal helper: put the current persona's signature color on the Govee top light as a
    solid, dim (brightness 15) ambient glow. Not for Assist — the top light is not exposed.
    This is the canonical "back to normal" path: it FIRST turns the device music-mode
    switch OFF (the built-in Spectrum/Rolling/etc. reactive modes need it on, and a solid
    color won't stick while it's on), then sets the color — so every revert must go
    through here.
  sequence:
  - action: switch.turn_off
    target:
      entity_id: switch.cube_light_music_mode
  - action: light.turn_on
    target:
      entity_id: light.top_light
    data:
      brightness: 15
      rgb_color: >-
        {{ {'buddy': [255,220,0], 'neon': [255,0,128], 'zorp': [160,0,255],
            'crash': [0,255,65], 'jax': [0,120,255]}
           .get(states('input_select.current_persona'), [255,255,255]) }}
  mode: single

set_top_light_effect:
  alias: Set Top Light Effect
  description: >-
    Put a preset look on the Govee top light, chosen from the device's full catalog.
    Good general moods: Sunset/Sunset Glow (warm, cozy), Aurora/Dreamland/Soothing (calm,
    dreamy), Fire (intense flicker), Ocean/Lake/Wave (cool, serene), Rainbow/Joyful
    (playful), Firefly/Starry Sky (gentle sparkle), Mysterious/Poison (eerie). Seasonal/
    holiday looks (Christmas*, Halloween, Ghost, Valentine's Day…) and planet themes (Mars,
    Jupiter, Milky Way) are in here too. Custom DIY looks: "Cyberpunk"/"Acid" are glitchy
    neon, "A vintage lava lamp"/"Slow Rainbow" are slow retro drifts, "Forest Rave" is
    frenetic. For a look that pulses live to music/sound, use set_music_reactive_lighting.
    For a plain solid color, set the light directly instead of using this.
  fields:
    effect:
      name: Effect
      description: Which look to run — a built-in scene or a DIY scene, all in one list.
      required: true
      selector:
        select:
          options:
          # Built-in scenes (select.cube_light_scene)
          - "Sunrise"
