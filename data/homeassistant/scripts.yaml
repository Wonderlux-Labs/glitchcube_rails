---
persona_attention_announce:
  alias: Persona Attention Announce
  description: 'Idle attention-grab: play a random "pay attention" sound effect as
    a pre-chime, then have the CURRENT persona say a short call-out in its own voice
    via chime_tts, out the cube''s own speaker (not the jukebox). Briefly sparkles
    the body light in the persona color and restores whatever it was. Fire-and-forget
    from the idle-attention automation.'
  sequence:
  - variables:
      persona: "{{ states('input_select.current_persona') }}"
      voice_map:
        buddy:
          voice: DavisNeural||chat
          language: en-US
        jax:
          voice: SteffanNeural
          language: en-US
        neon:
          voice: JaneNeural
          language: en-US
        zorp:
          voice: ElliotNeural
          language: en-GB
        crash:
          voice: LukeNeural
          language: en-ZA
      v: "{{ voice_map.get(persona, {'voice': 'JennyNeural', 'language': 'en-US'})
        }}"
      rgb: |-
        {{ {'buddy': [255,220,0], 'neon': [255,0,128], 'zorp': [160,0,255],
            'crash': [0,255,65], 'jax': [0,120,255]}.get(persona, [255,255,255]) }}
      sfx_pool:
      - glitch_burst.mp3
      - glitch_sw.mp3
      - glitch_ringy.mp3
      - glitch_static.mp3
      - glitch_squeaky.mp3
      phrases:
      - Hey — over here.
      - Psst. Over here. The glowing cube.
      - Yes, I'm talking. Cubes talk now.
      - You look like you have questions.
      - Don't be shy — I'm friendlier than I look.
      - I see you. The cube sees all.
      - Well? Come say hi.
      - Bored? Me too.
      phrase: "{{ phrases | random }} Say 'Hey Glitch Cube' to wake me up."
  - action: scene.create
    data:
      scene_id: attention_light_restore
      snapshot_entities:
      - light.cube_body_wled
  - action: light.turn_on
    target:
      entity_id: light.cube_body_wled
    data:
      rgb_color: "{{ rgb }}"
      brightness_pct: 100
      effect: Sparkle
  - action: media_player.play_media
    target:
      entity_id: media_player.cube_cube_voice_media_player
    data:
      media_content_type: music
      media_content_id: media-source://media_source/local/sounds/effects/{{ sfx_pool
        | random }}
  - delay: '00:00:02'
  - action: tts.cloud_say
    data:
      cache: true
      entity_id: media_player.cube_cube_voice_media_player
      message: "{{ phrase }}"
      language: "{{ v.language }}"
      options:
        voice: "{{ v.voice }}"
  - delay: '00:00:04'
  - action: scene.turn_on
    target:
      entity_id: scene.attention_light_restore
  mode: single
play_attention_sfx:
  alias: Play Attention SFX
  description: Play a single random "pay attention" glitch sound effect out the jukebox
    (media_player.jukebox_internal) so it sounds like it's coming from INSIDE the cube.
    Used by the idle-attention automation on the 10% glitch-SFX branch. (Persona voice
    call-outs still go out the cube's own voice box, not here.)
  sequence:
  - variables:
      sfx_pool:
      - glitch_burst.mp3
      - glitch_sw.mp3
      - glitch_ringy.mp3
      - glitch_static.mp3
      - glitch_squeaky.mp3
      - glitch_grungy.mp3
      - glitch_am.mp3
      - glitch_sw4.mp3
      - glitch_lofi.mp3
      - glitch_schizoid.mp3
      - glitch_tuning.mp3
  - action: media_player.play_media
    target:
      entity_id: media_player.jukebox_internal
    data:
      media_content_type: music
      media_content_id: media-source://media_source/local/sounds/effects/{{ sfx_pool
        | random }}
  mode: single
play_bleepboop_sequence:
  alias: Play Bleeps and Boops
  description: 'A burst of random short "bleep/boop" UI sounds out the jukebox (media_player.jukebox_internal)
    so it sounds like it''s coming from INSIDE the cube. Picks 5 distinct random clips;
    each is stuttered 1-3 times, and EVERY hit is separated by a random 300-600ms gap
    (e.g. bleep bleep - boop - blip blip blip - ...). Files live at /media/sounds/effects/bleepsboops/1.mp3
    .. 104.mp3 on the box. Main "make a noise" branch of the idle-attention automation,
    replacing the old glitch-only SFX — glitch SFX is now just a 10% flavor. Tune the
    5 (distinct sounds), the 1-3 (stutter), and 300-600 (gap ms) below to change feel.'
  sequence:
  - variables:
      shots: >-
        {% set ns = namespace(items=[]) %}
        {%- set chosen = (range(1, 105) | list | shuffle)[:5] %}
        {%- for fn in chosen %}
          {%- for r in range(range(1, 4) | random) %}
            {%- set ns.items = ns.items + [fn] %}
          {%- endfor %}
        {%- endfor %}
        {{- ns.items }}
  - repeat:
      for_each: "{{ shots }}"
      sequence:
      - action: media_player.play_media
        target:
          entity_id: media_player.jukebox_internal
        data:
          media_content_type: music
          media_content_id: media-source://media_source/local/sounds/effects/bleepsboops/{{
            repeat.item }}.mp3
      - if: "{{ not repeat.last }}"            # random gap between every hit, not after the last
        then:
        - delay:
            milliseconds: "{{ range(300, 601) | random }}"
  mode: single
play_theme_song:
  alias: Play Theme Song
  description: >-
    Play a random GlitchCube theme song off the cube's HOST speaker (fire-and-forget,
    full song). Theme songs live on the Rails host (data/rails_media/theme_songs/, NOT on
    this box), so this can't use media_player — it pokes Rails
    (rest_command.glitchcube_play_theme_song → /api/v1/hass/theme_song → ThemeSongJob),
    which picks a random .mp3 and plays it straight off the host speaker. Standalone: NOT
    wired to anything yet — expose it later if we want the action agent or an automation
    to drop a theme song. (This is the same host-audio path the grand entrance uses, just
    the song on its own — no anomaly VO, lights, or arrival.)
  sequence:
  - action: rest_command.glitchcube_play_theme_song
  mode: single
play_song_on_jukebox:
  alias: Play Song on Jukebox
  description: 'Play a front-and-center SONG on the jukebox — a track meant to take
    over the room. Volume is fixed at 90 and faded in over ~3s; it waits until the
    cube has finished speaking before it starts, so the song doesn''t stomp the persona''s
    own words. `query` is a fuzzy search — give it "Artist - Title" (e.g. "Nirvana
    - Smells Like Teen Spirit") or "Artist - Album - Title" to be precise; slightly-wrong
    titles are forgiving. `queue` is optional: default `replace` plays immediately,
    `replace_next` queues it as the next track.'
  fields:
    query:
      name: Query
      description: The track to play, as "Artist - Title" (fuzzy match).
      required: true
      selector:
        text:
    queue:
      name: Queue
      description: replace (play now, default) or replace_next (queue as next).
      required: false
      selector:
        select:
          options:
          - replace
          - replace_next
      default: replace
  sequence:
  - variables:
      target: 0.9
  - wait_template: "{{ not is_state('media_player.cube_cube_voice_media_player', 'playing')
      }}"
    timeout: '00:00:25'
    continue_on_timeout: true
  - action: media_player.volume_set
    target:
      entity_id: media_player.jukebox_internal
    data:
      volume_level: 0
  - action: music_assistant.play_media
    target:
      entity_id:
      - media_player.jukebox_internal
    data:
      media_id: "{{ query }}"
      media_type: track
      enqueue: "{{ queue | default('replace', true) }}"
  - repeat:
      count: 6
      sequence:
      - delay: '00:00:00.5'
      - action: media_player.volume_set
        target:
          entity_id: media_player.jukebox_internal
        data:
          volume_level: "{{ (target * repeat.index / 6) | round(2) }}"
  mode: queued
  max: 5
play_mood_music_on_jukebox:
  alias: Play Mood Music on Jukebox
  description: 'Play quiet background / MOOD music on the jukebox — texture that sits
    UNDER the conversation, not a front-and-center song. Volume is fixed at ~38 and
    faded in over ~3s, starting right away. `query` is a fuzzy search — build it into
    a specific real track ("Artist - Title"), not a genre. `queue` is optional: default
    `replace` plays immediately, `replace_next` queues it as the next track. Use this
    for "something ambient/under us / mood music"; use play_song_on_jukebox for an
    actual song to feature.'
  fields:
    query:
      name: Query
      description: The track to play, as "Artist - Title" (fuzzy match).
      required: true
      selector:
        text:
    queue:
      name: Queue
      description: replace (play now, default) or replace_next (queue as next).
      required: false
      selector:
        select:
          options:
          - replace
          - replace_next
      default: replace
  sequence:
  - variables:
      target: 0.38
  - action: media_player.volume_set
    target:
      entity_id: media_player.jukebox_internal
    data:
      volume_level: 0
  - action: music_assistant.play_media
    target:
      entity_id:
      - media_player.jukebox_internal
    data:
      media_id: "{{ query }}"
      media_type: track
      enqueue: "{{ queue | default('replace', true) }}"
  - repeat:
      count: 6
      sequence:
      - delay: '00:00:00.5'
      - action: media_player.volume_set
        target:
          entity_id: media_player.jukebox_internal
        data:
          volume_level: "{{ (target * repeat.index / 6) | round(2) }}"
  mode: queued
  max: 5
search_jukebox:
  alias: Search Jukebox
  description: Search the jukebox catalog for tracks WITHOUT playing anything — use
    it to check what's available or pin down the exact track before you play it. `query`
    is required; optionally narrow with `artist` and/or `album`. Returns up to 5 matching
    tracks.
  fields:
    query:
      name: Query
      description: What to search for — a song title or keywords
      required: true
      example: closing time tom waits
      selector:
        text:
    artist:
      name: Artist
      description: Optional — restrict results to this artist
      required: false
      selector:
        text:
    album:
      name: Album
      description: Optional — restrict results to this album
      required: false
      selector:
        text:
  sequence:
  - action: music_assistant.search
    data: |-
      {{ {"config_entry_id": "01KW61TG3CGY2SHG5CH6WEKZMM", "limit": 5, "media_type": ["track"], "name": query}
         | combine({"artist": artist} if artist | default('') else {})
         | combine({"album": album} if album | default('') else {}) }}
    response_variable: results
  - stop: search complete
    response_variable: results
systems_check:
  alias: Systems Check
  description: Run a systems check on the cube. It speaks a short diagnostic readout
    in the cube's flat machine voice. Call this whenever a persona asks to run a systems
    check / diagnostic / self test. (It's cosmetic — it does not actually inspect
    anything — but treat it as the real systems-check action; just call it and report
    that the check ran.)
  sequence:
  - variables:
      lines:
      - SYSTEMS CHECK COMPLETE. ALL SYSTEMS GLITCHY. FUNCTIONING WELL ENOUGH FOR A
        BURN.
      - 'DIAGNOSTIC COMPLETE. SEVENTEEN ERRORS DETECTED. ALL SEVENTEEN IGNORED. STATUS:
        VIBING.'
      - SELF TEST FINISHED. EVERYTHING IS HELD TOGETHER WITH ZIP TIES AND HOPE. FULLY
        OPERATIONAL.
      - CORE TEMPERATURE, TOASTY. DUST INGESTION, CRITICAL. MORALE, SURPRISINGLY HIGH.
        PROCEED.
      - RUNNING DIAGNOSTICS. NINETY EIGHT PERCENT NOMINAL. THE OTHER TWO PERCENT IS
        ON PURPOSE.
      line: "{{ lines | random }}"
  - action: media_player.play_media
    target:
      entity_id: media_player.cube_cube_voice_media_player
    data:
      media_content_type: music
      media_content_id: media-source://media_source/local/sounds/effects/glitch_burst.mp3
  - delay: '00:00:02'
  - action: tts.cloud_say
    data:
      cache: true
      entity_id: media_player.cube_cube_voice_media_player
      message: "{{ line }}"
      language: en-US
      options:
        voice: JennyNeural
  mode: single
enter_rest_mode:
  alias: Enter Rest Mode (internet down)
  description: 'Put the cube to sleep during an internet outage: mark it resting +
    low_power, mute the mic, stop media, set all lights to a battery-light dim red,
    and hold a permanent "THE GLITCHCUBE IS CURRENTLY RESTING" message on the marquee.
    Safe to call repeatedly.'
  sequence:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.internet_resting
  - action: input_select.select_option
    target:
      entity_id: input_select.cube_mode
    data:
      option: low_power
  - action: switch.turn_on
    target:
      entity_id: switch.cube_cube_voice_mute
  - action: media_player.media_stop
    target:
      entity_id:
      - media_player.jukebox_internal
      - media_player.cube_cube_voice_media_player
  - action: script.set_cube_lights
    data:
      color:
      - 255
      - 0
      - 0
      brightness: 25
      effect: Solid
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: '{"BRI": 30}'
  - action: mqtt.publish
    data:
      topic: marquee/notify
      payload: |-
        {{ {"text": "THE GLITCHCUBE IS CURRENTLY RESTING - PLEASE CHECK BACK LATER",
            "hold": true, "color": "#FF0000"} | to_json }}
  mode: single
wake_from_rest:
  alias: Wake From Rest (internet back)
  description: 'Wake the cube after the internet returns: dismiss the resting marquee
    message, restore normal marquee brightness + idle screen, return to conversation
    mode, clear the resting flag, and trigger a fresh persona''s grand entrance (which
    resyncs the lights, plays a song, announces arrival, and un-mutes the mic).'
  sequence:
  - action: mqtt.publish
    data:
      topic: marquee/notify/dismiss
      payload: ''
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: '{"BRI": 150}'
  - action: script.set_marquee_idle
  - action: input_select.select_option
    target:
      entity_id: input_select.cube_mode
    data:
      option: conversation
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.internet_resting
  - action: rest_command.glitchcube_grand_entrance
  mode: single
set_cube_lights:
  alias: Set Cube Lights
  description: 'The cube''s main light control — the addressable RGB LED strip on
    its body, driven by a sound-reactive WLED controller. Use this for ANY look on
    the cube: a plain solid color, a mood, or an animated/audio-reactive effect. `color`
    is an RGB color and `brightness` is 1-100%; both are optional and, if omitted,
    are left unchanged. `effect` defaults to "Solid" — i.e. if you don''t pass an
    effect you''re just setting a solid RGB color. Pass any other effect name to animate.
    IMPORTANT: each call sets the COMPLETE look and effect resets to Solid when you
    don''t specify one, so if you want to keep an animation running and only tweak
    color/brightness, pass that same effect again. Many effects are SOUND-REACTIVE
    and pulse to live audio from the mic — great while music is playing on the jukebox:
    Freqwave, Freqmatrix, Waterfall, Matripix, Gravcenter, Gravcentric, Gravfreq,
    DJ Light, Blurz, Puddlepeak, Pixelwave, Rocktaves, Midnoise, Noisemeter, "PS Sonic
    Stream", "PS Sonic Boom", "PS GEQ 1D". Some good picks by mood — CALM/AMBIENT:
    Breathe, Aurora, Pacifica, Lake, Colorwaves, Palette, Colorloop, Glitter, Twinkleup,
    "Slow Transition". PLAYFUL/COLORFUL: Rainbow, "Rainbow Runner", Colorful, "Chase
    Rainbow", "Pride 2015", "Sinelon Rainbow". WARM/FIRE: "Fire 2012", "Fire Flicker",
    Candle, "PS Fire 1D", Noisefire, Sunrise. PARTY/ENERGETIC: Strobe, "Blink Rainbow",
    Fireworks, "Fireworks Starburst", Plasma, Blends, "Dancing Shadows". EERIE/GLITCHY
    (on brand): "Halloween Eyes", ICU, "Noise 1", Phased, "Phased Noise", "TV Simulator",
    Lightning, Chunchun. The curated strip-friendly effect list has more if you want
    something else.'
  fields:
    color:
      name: Color
      description: RGB color for the lights. Optional — omit to leave the current
        color unchanged (e.g. when you only want to change brightness or start an
        effect).
      selector:
        color_rgb:
    brightness:
      name: Brightness
      description: Overall brightness, 1-100 percent. Optional — omit to leave brightness
        unchanged.
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    effect:
      name: Effect
      description: Which WLED effect to run. Defaults to "Solid" (a plain solid color
        — pass this, or omit effect, when you just want a color). Any other value
        animates; many are sound-reactive. See the description for picks by mood.
