  alias: Set Music-Reactive Lighting
  description: >-
    Make the cube's main light pulse LIVE to whatever sound is playing — use this whenever
    you want the light to react to the music/audio. Pick one of the sound-reactive looks
    below. (For a static scene, mood, or color instead, use set_cube_light_effect or set
    the light directly.)
  fields:
    effect:
      name: Effect
      description: Which sound-reactive look to run
      required: true
      selector:
        select:
          options:
          - "Music reactive jazz"
          - "A music reactive smoky"
  sequence:
  - action: select.select_option
    target:
      entity_id: select.cube_light_diy_scene
    data:
      option: "{{ effect }}"
  mode: single

