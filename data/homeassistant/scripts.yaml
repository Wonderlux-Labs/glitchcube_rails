# ONE play script for both front-and-center songs AND quiet background/mood music — the
# required `volume` decides which (no more duplicate play_background_music). A required,
# no-default volume forces the calling agent to choose a level deliberately; the description
# anchors the two bands (25-35 background, 80-90 front-and-center).
play_music_on_jukebox:
  fields:
    query:
      selector:
        text:
      required: true
      name: query
    volume:
      name: Volume
      description: >-
        Playback volume, 0-100 percent. REQUIRED — choose deliberately: 25-35 for quiet
        background/mood music that sits UNDER the conversation, 80-90 for a front-and-center
        song, a dance party, or anytime the music should take the room.
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    queue:
      selector:
        select:
          options:
          - replace
          - replace_next
      default: replace
  sequence:
  # The volume you pass sets whether this is a front-and-center song or background texture.
  - action: media_player.volume_set
    metadata: {}
    target:
      entity_id: media_player.jukebox_internal
    data:
      volume_level: "{{ (volume | float) / 100 }}"
  - action: music_assistant.play_media
    metadata: {}
    target:
      entity_id:
      - media_player.jukebox_internal
    data:
      media_id: '{{ query }}'
      media_type: track
      enqueue: "{{ queue | default('replace', true) }}"
  alias: Play Music on Jukebox
  description: >-
    The one way to play music on the jukebox — for BOTH front-and-center songs and quiet
    background/mood music; the `volume` you pass decides which. `query` is a fuzzy search that
    finds the best match — give it "Artist - Title" (e.g. "Nirvana - Smells Like Teen Spirit")
    or "Artist - Album - Title" to be precise; slightly-wrong titles are forgiving. `volume` is
    REQUIRED (25-35 = background under the conversation, 80-90 = front-and-center / dance party).
    `queue` is optional: default `replace` plays immediately, `replace_next` queues it as the
    next track. Keep queues short — you're either playing now or picking the next song.

loudspeaker_announcement:
  alias: Loudspeaker Announcement (dev)
  description: >-
    Read a message aloud over the cube's loudspeakers — much louder than the normal
    speaking voice, for the rare dramatic moment. Optionally start the message with a
    chime sound to grab attention first.
  fields:
    message:
      name: Message
      description: The message to read aloud over the loudspeakers
      required: true
      example: "Attention. Dance time has been officially declared."
      selector:
        text:
    prepend_with_chime:
      name: Prepend with chime
      description: Start the announcement with a chime sound
      required: false
      default: false
      selector:
        boolean:
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.announcement
    data:
      value: "{{ message }}"

search_jukebox:
  alias: Search Jukebox
  description: >-
    Search the jukebox catalog for tracks WITHOUT playing anything — use it to check what's
    available or pin down the exact track before you play it. `query` is required; optionally
    narrow with `artist` and/or `album`. Returns up to 5 matching tracks.
  fields:
    query:
      name: Query
      description: What to search for — a song title or keywords
      required: true
      example: "closing time tom waits"
      selector:
        text:
    artist:
      name: Artist
      description: Optional — restrict results to this artist
      required: false
      selector:
        text:
    album:
      name: Album
      description: Optional — restrict results to this album
      required: false
      selector:
        text:
  sequence:
  - action: music_assistant.search
    data: >-
      {{ {"config_entry_id": "01KW61TG3CGY2SHG5CH6WEKZMM", "limit": 5, "media_type": ["track"], "name": query}
         | combine({"artist": artist} if artist | default('') else {})
         | combine({"album": album} if album | default('') else {}) }}
    response_variable: results
  - stop: "search complete"
    response_variable: results

# --- AWTRIX marquee (real) -------------------------------------------------------
# Drives the physical AWTRIX LED sign (HASS device "awtrix_marquee") directly over
# MQTT. The awtrix.* services are NOT registered on this box, so we publish to the
# device's own MQTT topic. The topic PREFIX is "marquee" — reported by
# sensor.cube_awtrix_marquee_device_topic — NOT the HASS entity name "awtrix_marquee".
# A notification interrupts the app loop, shows the text, then returns to normal.

awtrix_marquee_message:
  alias: AWTRIX Marquee Message
  description: >-
    Flash a message across the cube's LED marquee sign. Only `message` is required —
    optionally give it a `color` (hex like "#FF00AA"), turn on `rainbow` text, or set
    how many seconds it shows (`duration`). It interrupts the sign to show your text,
    then returns to the normal display.
  fields:
    message:
      name: Message
      description: The text to scroll across the marquee (keep it under ~255 chars)
      required: true
      example: "JAX DOESN'T PLAY THAT"
      selector:
        text:
    color:
      name: Color
      description: Optional text color as a hex string, e.g. "#FF00AA". Ignored when rainbow is on.
      required: false
      selector:
        text:
    rainbow:
      name: Rainbow
      description: Rainbow-cycle the text color (overrides color)
      required: false
      default: false
      selector:
        boolean:
    duration:
      name: Duration
      description: Seconds to display before returning to the normal loop
      required: false
      default: 20
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: s
  sequence:
  - variables:
      # Capture the current (idle) brightness so the tail can restore it after the message.
      # The AWTRIX matrix light's brightness IS the device BRI setting (0-255); the idle
      # screen often runs dim, which would make an un-boosted message hard to read.
      prev_bri: "{{ state_attr('light.cube_awtrix_marquee_matrix', 'brightness') | int(255) }}"
      dur: "{{ (duration | default(20, true)) | int }}"
      notify_payload: >-
        {% set p = {"text": message, "duration": dur} %}
        {% if rainbow | default(false, true) %}{% set p = p | combine({"rainbow": true}) %}
        {% elif color | default('', true) %}{% set p = p | combine({"color": color}) %}{% endif %}
        {{ p | to_json }}
  # Force full brightness FIRST so the notification is always readable, even when the
  # idle screen was dimmed down.
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: '{"BRI": 255}'
  - action: mqtt.publish
    data:
      topic: marquee/notify
      payload: "{{ notify_payload | trim }}"
  # NON-BLOCKING: fire-and-forget the brightness restore so this script returns instantly
  # (the calling conversation agent no longer waits out the whole message duration). The
  # tail sleeps for the message's life, then restores the captured idle brightness.
  - action: script.turn_on
    target:
      entity_id: script.awtrix_marquee_restore_brightness
    data:
      variables:
        prev_bri: "{{ prev_bri }}"
        dur: "{{ dur }}"
  mode: queued
  max: 5

awtrix_marquee_restore_brightness:
  alias: AWTRIX Marquee Restore Brightness
  description: >-
    Internal tail for awtrix_marquee_message. After a message's duration elapses, restore
    the marquee to its pre-message (idle) brightness. Fired non-blocking via script.turn_on
    so the message script returns immediately. Not for Assist — no agent should call this.
  fields:
    prev_bri:
      name: Previous brightness
      description: Brightness (0-255) to restore after the message.
      required: true
      selector:
        number:
          min: 0
          max: 255
    dur:
      name: Duration
      description: Message duration in seconds (the tail waits this + 1s before restoring).
      required: true
      selector:
        number:
          min: 1
          max: 120
  sequence:
  - delay: "{{ (dur | default(20, true)) | int + 1 }}"
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: "{{ {'BRI': prev_bri | int(255)} | to_json }}"
  mode: parallel
  max: 10

awtrix_marquee_clear:
  alias: AWTRIX Marquee Clear
  description: >-
    Clear/dismiss the current message on the cube's LED marquee sign, returning it to
    its normal display.
  sequence:
  - action: mqtt.publish
    data:
      topic: marquee/notify/dismiss
      payload: ""
  mode: single

# --- AWTRIX idle screen (single always-on background app) ------------------------
# The marquee runs ONE always-on custom app named "idle" — the only app in its loop —
# plus transient notifications (awtrix_marquee_message) that overlay it. Device is set
# ATRANS=false (no app transitions; a 1-app loop has nothing to transition to), so an
# effect published to marquee/custom/idle with NO duration holds indefinitely until the
# next publish (verified on device 2026-07-09). Division of labor: AUTOMATIONS decide
# WHEN to change the idle screen; the set_marquee_idle SCRIPT decides WHAT it shows.

# set_marquee_idle — the "what". Call with nothing for a random effect/palette/speed, or
# pass any subset to dial in a specific look. Publishes retained, no duration.
set_marquee_idle:
  alias: Set Marquee Idle Effect
  description: >-
    Set the marquee's always-on "idle" screen to an effect (the only thing shown besides
    notifications). Call with no args for a random ambient effect + random palette + random
    speed (3-5); or pass any of effect/palette/speed/blend/brightness to pin a look. Great
    for tuning in Developer Tools → Actions: play until a combo looks best, then put that
    combo in an automation. Publishes to marquee/custom/idle over MQTT, retained, NO duration.
  fields:
    effect:
      name: Effect
      description: Effect name. Omit for a random ambient effect.
      required: false
      selector:
        select:
          options: [Fade, MovingLine, BrickBreaker, PingPong, Radar, Checkerboard,
            Fireworks, PlasmaCloud, Ripple, Snake, Pacifica, TheaterChase, Plasma,
            Matrix, SwirlIn, SwirlOut, LookingEyes, TwinklingStars, ColorWaves]
    palette:
      name: Palette
      description: Color palette. Omit for a random palette.
      required: false
      selector:
        select:
          options: [Rainbow, Cloud, Ocean, Forest, Party, Lava, Heat]
    speed:
      name: Speed
      description: 1-8, higher = faster. Omit for a random 3-5.
      required: false
      selector:
        number: { min: 1, max: 8, mode: box }
    blend:
      name: Blend
      description: Blend the palette across the effect.
      required: false
      selector:
        boolean:
    brightness:
      name: Brightness
      description: Global matrix brightness 0-255. Omit to leave unchanged.
      required: false
      selector:
        number: { min: 0, max: 255, mode: slider }
  sequence:
  - variables:
      ambient_pool: [PlasmaCloud, Ripple, Pacifica, TwinklingStars, ColorWaves, Plasma,
        Matrix, SwirlIn, SwirlOut, Fireworks, Radar, PingPong]
      palette_pool: [Rainbow, Cloud, Ocean, Forest, Party, Lava, Heat]
      eff: "{{ effect | default(ambient_pool | random, true) }}"
      pal: "{{ palette | default(palette_pool | random, true) }}"
      spd: "{{ (speed | default(range(3, 6) | random, true)) | int }}"
      bln: "{{ blend | default(true) }}"
  - if: "{{ brightness is defined and brightness not in [none, ''] }}"
    then:
    - action: mqtt.publish
      data:
        topic: marquee/settings
        payload: "{{ {'BRI': brightness | int} | to_json }}"
  - action: mqtt.publish
    data:
      topic: marquee/custom/idle
      retain: true
      payload: "{{ {'effect': eff, 'effectSettings': {'speed': spd, 'palette': pal, 'blend': bln}} | to_json }}"
  mode: queued
  max: 10

# Seed after a device reflash: disable app transitions (single-app loop) and set a
# baseline idle effect via the script above. Run once; the automation cycles it after.
awtrix_install_idle_apps:
  alias: AWTRIX Seed Idle App
  description: >-
    Post-reflash seed for the marquee: turn OFF app transitions (ATRANS, a device setting
    wiped by reflash) since the loop is a single app, then set a baseline idle effect. The
    idle-cycle automation takes over from there.
  sequence:
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: '{"ATRANS":false}'
  - action: script.set_marquee_idle
    data:
      effect: Pacifica
      palette: Ocean
      speed: 4
  mode: single

# --- Cube WLED lighting (Assist-facing) ------------------------------------------
# The ONE addressable-LED control exposed to the Assist action agent. The cube's show
# LEDs are a single sound-reactive WLED controller with two outputs: the HEAD strip
# (~30 LEDs, light.glitch_head_wled) and the BODY strip (~60 LEDs, light.cube_body_wled).
# This script hides that plumbing — the agent just picks a strip (both/head/body), an
# optional color + brightness, and an effect. `both` fans the SAME command out to head
# and body in one call; to give them different looks, call the script twice (once with
# led_strip: head, once with led_strip: body). Routing/mapping lives here so the agent
# only ever sees one lighting tool. NOT the top light — that's internal (see below).
set_cube_lights:
  alias: Set Cube Lights
  description: >-
    The cube's main light control — its addressable RGB LEDs, split into a HEAD strip and a
    BODY strip driven by one sound-reactive WLED controller. Use this for ANY look on the
    cube's body/head: a plain solid color, a mood, or an animated/audio-reactive effect.
    Pick `led_strip`: "both" (default — same look on head and body), "head", or "body". To
    make the head and body DIFFERENT, call this twice, once per strip. `color` is an RGB
    color and `brightness` is 1-100%; both are optional and, if omitted, are left unchanged.
    `effect` defaults to "Solid" — i.e. if you don't pass an effect you're just setting a
    solid RGB color. Pass any other effect name to animate. IMPORTANT: each call sets the
    COMPLETE look and effect resets to Solid when you don't specify one, so if you want to
    keep an animation running and only tweak color/brightness, pass that same effect again.
    Many effects are SOUND-REACTIVE and pulse to live audio from the mic — great while music
    is playing on the jukebox: GEQ, Freqwave, Freqmatrix, Waterfall, Matripix, Gravcenter,
    Gravcentric, DJ Light, Blurz, Puddlepeak, Pixelwave, Rocktaves, Midnoise, Noisemeter,
    "PS Sonic Stream", "PS Sonic Boom", "PS GEQ 1D". Some good picks by mood — CALM/AMBIENT:
    Breathe, Aurora, Pacifica, Lake, Colorwaves, Palette, Colorloop, Glitter, Twinkleup,
    "Slow Transition". PLAYFUL/COLORFUL: Rainbow, "Rainbow Runner", Colorful, "Chase Rainbow",
    "Pride 2015", "Sinelon Rainbow". WARM/FIRE: "Fire 2012", "Fire Flicker", Candle, "PS Fire",
    "Sun Radiation", Sunrise. PARTY/ENERGETIC: Strobe, "Blink Rainbow", Fireworks,
    "Fireworks Starburst", Plasma, Blends, "Dancing Shadows". EERIE/GLITCHY (on brand):
    "Halloween Eyes", "Ghost Rider", "Black Hole", Matrix, "Noise 1", Phased,
    "Distortion Waves", Frizzles, Octopus, Soap. The full WLED effect catalog is in the
    effect list if you want something else.
  fields:
    led_strip:
      name: LED strip
      description: Which part of the cube to light. "both" (default) sends the same look to
        head and body; "head" or "body" targets just one. Call twice to differ them.
      default: both
      selector:
        select:
          options:
          - both
          - head
          - body
    color:
      name: Color
      description: RGB color for the lights. Optional — omit to leave the current color
        unchanged (e.g. when you only want to change brightness or start an effect).
      selector:
        color_rgb:
    brightness:
      name: Brightness
      description: Overall brightness, 1-100 percent. Optional — omit to leave brightness
        unchanged.
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    effect:
      name: Effect
      description: Which WLED effect to run. Defaults to "Solid" (a plain solid color — pass
        this, or omit effect, when you just want a color). Any other value animates; many are
