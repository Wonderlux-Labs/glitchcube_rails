play_music_on_jukebox:
  fields:
    query:
      selector:
        text:
      required: true
      name: query
    queue:
      selector:
        select:
          options:
          - replace
          - replace_next
      default: replace
  sequence:
  - action: music_assistant.play_media
    metadata: {}
    target:
      entity_id:
      - media_player.jukebox
      - media_player.jukebox_internal
    data:
      media_id: '{{ query }}'
      media_type: track
      enqueue: "{{ queue | default('replace', true) }}"
  alias: Play Music on Jukebox
  description: This is the best way to play music on the jukebox. Query is a fuzzy
    search param that will find the best match, generally it should be something like
    Nirvana - Smells Like Teen Spirit, but you could also use Artist - Album - Title
    if you want. If you get the title name slightly wrong it is pretty forgiving.
    Queue is an optional param, by default it is set to replace and will start playing
    automatically. If there is currently a song playing, and you want to queue up
    the next song, you can use replace_next. We don't want to run very long queues,
    so you will either be playing immediately or just choosing the next song, by default
    it uses replace

# --- DEV mocks -------------------------------------------------------------------
# Safe stand-ins for the real audio actions: instead of actually playing anything,
# each just records the requested query/effect into an input_text so we can SEE what
# the HASS action agent chose to call, without waking a house. Expose THESE to Assist
# (and unexpose the real play_music_on_jukebox above) while testing. Wire up real
# behavior and hide the dev ones later.

play_song_on_jukebox_dev:
  alias: Play Song on Jukebox (dev)
  description: >-
    Play a specific, named song front and center on the cube's jukebox. `query` is a
    fuzzy search — give it a song as "Title by Artist" (e.g. "Under Pressure by Queen"),
    or "Artist - Album - Title" if you want to be precise. Be as specific as you can and
    we'll find the best match; slightly-wrong titles are forgiving. Use this to actually
    play a song, not for background ambiance.
  fields:
    query:
      name: Query
      description: The song to play, e.g. "Ol' 55 by Tom Waits" or "Nirvana - Nevermind - Come As You Are"
      required: true
      example: "Play That Funky Music by Wild Cherry"
      selector:
        text:
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.dev_jukebox_song
    data:
      value: "{{ query }}"

play_mood_music_dev:
  alias: Play Mood Music (dev)
  description: >-
    Put on background mood music for ambiance. Searchable across most of Spotify — give a
    vibe, genre, or a specific track/artist as `query`. This plays quietly UNDER the
    conversation (it ducks its own volume so you can still be heard), so it's texture, not
    a front-and-center song. Use it to set a mood, not to feature a track.
  fields:
    query:
      name: Query
      description: The vibe or track for background music, e.g. "slow dark ambient", "lo-fi beats", or "Boards of Canada"
      required: true
      example: "moody late-night jazz"
      selector:
        text:
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.dev_mood_music
    data:
      value: "{{ query }}"

play_sound_effect_dev:
  alias: Play Sound Effect (dev)
  description: >-
    Fire a short sound effect / stinger for comic or dramatic accent. Pick one of the
    available effects. Use sparingly, as punctuation — not as background music.
  fields:
    effect:
      name: Effect
      description: Which sound effect to play
      required: true
      selector:
        select:
          options:
          - chime
          - tada
          - sad trombone
          - siren
          - airhorn
          - record scratch
          - crickets
          - drumroll
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.dev_sound_effect
    data:
      value: "{{ effect }}"

loudspeaker_announcement:
  alias: Loudspeaker Announcement (dev)
  description: >-
    Read a message aloud over the cube's loudspeakers — much louder than the normal
    speaking voice, for the rare dramatic moment. Optionally start the message with a
    chime sound to grab attention first.
  fields:
    message:
      name: Message
      description: The message to read aloud over the loudspeakers
      required: true
      example: "Attention. Dance time has been officially declared."
      selector:
        text:
    prepend_with_chime:
      name: Prepend with chime
      description: Start the announcement with a chime sound
      required: false
      default: false
      selector:
        boolean:
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.announcement
    data:
      value: "{{ message }}"

search_jukebox:
  alias: Search Jukebox
  description: >-
    Search the jukebox catalog for tracks WITHOUT playing anything — use it to check what's
    available or pin down the exact track before you play it. `query` is required; optionally
    narrow with `artist` and/or `album`. Returns up to 5 matching tracks.
  fields:
    query:
      name: Query
      description: What to search for — a song title or keywords
      required: true
      example: "closing time tom waits"
      selector:
        text:
    artist:
      name: Artist
      description: Optional — restrict results to this artist
      required: false
      selector:
        text:
    album:
      name: Album
      description: Optional — restrict results to this album
      required: false
      selector:
        text:
  sequence:
  - action: music_assistant.search
    data: >-
      {{ {"config_entry_id": "01KW61TG3CGY2SHG5CH6WEKZMM", "limit": 5, "media_type": ["track"], "name": query}
         | combine({"artist": artist} if artist | default('') else {})
         | combine({"album": album} if album | default('') else {}) }}
    response_variable: results
  - stop: "search complete"
    response_variable: results

set_marquee_text_dev:
  alias: Set Marquee Text (dev)
  description: >-
    Set the text on the cube's scrolling marquee sign. Provide the `message`; optionally a
    `color` and whether it should `blink`. Use it to put words on the sign — promos, jokes,
    heckles, fourth-wall breaks, whatever you want people to read.
  fields:
    message:
      name: Message
      description: The text to show on the marquee (keep it under ~255 chars)
      required: true
      example: "JAX DOESN'T PLAY THAT"
      selector:
        text:
    color:
      name: Color
      description: Optional — color for the text, e.g. "hot pink"
      required: false
      selector:
        text:
    blink:
      name: Blink
      description: Whether the text should blink
      required: false
      default: false
      selector:
        boolean:
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.marquee_text
    data:
      value: "{% if color | default('') %}{{ color }} - {% endif %}{{ message }}"

# --- AWTRIX marquee (real) -------------------------------------------------------
# Drives the physical AWTRIX LED sign (HASS device "awtrix_marquee") directly over
# MQTT. The awtrix.* services are NOT registered on this box, so we publish to the
# device's own MQTT topic. The topic PREFIX is "marquee" — reported by
# sensor.cube_awtrix_marquee_device_topic — NOT the HASS entity name "awtrix_marquee".
# A notification interrupts the app loop, shows the text, then returns to normal.

awtrix_marquee_message:
  alias: AWTRIX Marquee Message
  description: >-
    Flash a message across the cube's LED marquee sign. Only `message` is required —
    optionally give it a `color` (hex like "#FF00AA"), turn on `rainbow` text, or set
    how many seconds it shows (`duration`). It interrupts the sign to show your text,
    then returns to the normal display.
  fields:
    message:
      name: Message
      description: The text to scroll across the marquee (keep it under ~255 chars)
      required: true
      example: "JAX DOESN'T PLAY THAT"
      selector:
        text:
    color:
      name: Color
      description: Optional text color as a hex string, e.g. "#FF00AA". Ignored when rainbow is on.
      required: false
      selector:
        text:
    rainbow:
      name: Rainbow
      description: Rainbow-cycle the text color (overrides color)
      required: false
      default: false
      selector:
        boolean:
    duration:
      name: Duration
      description: Seconds to display before returning to the normal loop
      required: false
      default: 20
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: s
  sequence:
  - variables:
      notify_payload: >-
        {% set p = {"text": message, "duration": (duration | default(20, true)) | int} %}
        {% if rainbow | default(false, true) %}{% set p = p | combine({"rainbow": true}) %}
        {% elif color | default('', true) %}{% set p = p | combine({"color": color}) %}{% endif %}
        {{ p | to_json }}
  - action: mqtt.publish
    data:
      topic: marquee/notify
      payload: "{{ notify_payload | trim }}"
  mode: single

awtrix_marquee_clear:
  alias: AWTRIX Marquee Clear
  description: >-
    Clear/dismiss the current message on the cube's LED marquee sign, returning it to
    its normal display.
  sequence:
  - action: mqtt.publish
    data:
      topic: marquee/notify/dismiss
      payload: ""
  mode: single

# --- AWTRIX idle screen (single always-on background app) ------------------------
# The marquee runs ONE always-on custom app named "idle" — the only app in its loop —
# plus transient notifications (awtrix_marquee_message) that overlay it. Device is set
# ATRANS=false (no app transitions; a 1-app loop has nothing to transition to), so an
# effect published to marquee/custom/idle with NO duration holds indefinitely until the
# next publish (verified on device 2026-07-09). Division of labor: AUTOMATIONS decide
# WHEN to change the idle screen; the set_marquee_idle SCRIPT decides WHAT it shows.

# set_marquee_idle — the "what". Call with nothing for a random effect/palette/speed, or
# pass any subset to dial in a specific look. Publishes retained, no duration.
set_marquee_idle:
  alias: Set Marquee Idle Effect
  description: >-
    Set the marquee's always-on "idle" screen to an effect (the only thing shown besides
    notifications). Call with no args for a random ambient effect + random palette + random
    speed (3-5); or pass any of effect/palette/speed/blend/brightness to pin a look. Great
    for tuning in Developer Tools → Actions: play until a combo looks best, then put that
    combo in an automation. Publishes to marquee/custom/idle over MQTT, retained, NO duration.
  fields:
    effect:
      name: Effect
      description: Effect name. Omit for a random ambient effect.
      required: false
      selector:
        select:
          options: [Fade, MovingLine, BrickBreaker, PingPong, Radar, Checkerboard,
            Fireworks, PlasmaCloud, Ripple, Snake, Pacifica, TheaterChase, Plasma,
            Matrix, SwirlIn, SwirlOut, LookingEyes, TwinklingStars, ColorWaves]
    palette:
      name: Palette
      description: Color palette. Omit for a random palette.
      required: false
      selector:
        select:
          options: [Rainbow, Cloud, Ocean, Forest, Party, Lava, Heat]
    speed:
      name: Speed
      description: 1-8, higher = faster. Omit for a random 3-5.
      required: false
      selector:
        number: { min: 1, max: 8, mode: box }
    blend:
      name: Blend
      description: Blend the palette across the effect.
      required: false
      selector:
        boolean:
    brightness:
      name: Brightness
      description: Global matrix brightness 0-255. Omit to leave unchanged.
      required: false
      selector:
        number: { min: 0, max: 255, mode: slider }
  sequence:
  - variables:
      ambient_pool: [PlasmaCloud, Ripple, Pacifica, TwinklingStars, ColorWaves, Plasma,
        Matrix, SwirlIn, SwirlOut, Fireworks, Radar, PingPong]
      palette_pool: [Rainbow, Cloud, Ocean, Forest, Party, Lava, Heat]
      eff: "{{ effect | default(ambient_pool | random, true) }}"
      pal: "{{ palette | default(palette_pool | random, true) }}"
      spd: "{{ (speed | default(range(3, 6) | random, true)) | int }}"
      bln: "{{ blend | default(true) }}"
  - if: "{{ brightness is defined and brightness not in [none, ''] }}"
    then:
    - action: mqtt.publish
      data:
        topic: marquee/settings
        payload: "{{ {'BRI': brightness | int} | to_json }}"
  - action: mqtt.publish
    data:
      topic: marquee/custom/idle
      retain: true
      payload: "{{ {'effect': eff, 'effectSettings': {'speed': spd, 'palette': pal, 'blend': bln}} | to_json }}"
  mode: queued
  max: 10

# Seed after a device reflash: disable app transitions (single-app loop) and set a
# baseline idle effect via the script above. Run once; the automation cycles it after.
awtrix_install_idle_apps:
  alias: AWTRIX Seed Idle App
  description: >-
    Post-reflash seed for the marquee: turn OFF app transitions (ATRANS, a device setting
    wiped by reflash) since the loop is a single app, then set a baseline idle effect. The
    idle-cycle automation takes over from there.
  sequence:
  - action: mqtt.publish
    data:
      topic: marquee/settings
      payload: '{"ATRANS":false}'
  - action: script.set_marquee_idle
    data:
      effect: Pacifica
      palette: Ocean
      speed: 4
  mode: single

# --- Cube light preset effects ---------------------------------------------------
# The cube light (light.cube_light, a govee2mqtt device) is ALSO exposed directly for
# solid colors/brightness. This script is the curated preset layer on top of it: a
# short pick-list of MOOD scenes plus MUSIC-REACTIVE modes that pulse live to whatever
# audio the light hears (handy when a persona has music going). Scenes route through
# select.cube_light_scene; music-reactive routes through switch + select.cube_light_
# music_mode. Picking a mood turns music mode OFF so they don't fight. The device has
# ~97 scenes + DIY scenes; we intentionally surface only a few so the agent isn't
# overwhelmed. "Energetic" maps to the device's "Energic" spelling.

set_cube_light_effect:
  alias: Set Cube Light Effect
  description: >-
    Put a preset effect on the cube's main light. Choose a MOOD scene for ambiance, a
    DIY scene for a distinctive look (a couple pulse to music on their own), or a
    MUSIC-REACTIVE mode that reacts live to whatever's playing (great when you've got a
    track going). Moods: Sunset (warm, cozy), Aurora (calm, dreamy), Fire (intense,
    flickering), Ocean (cool, serene), Rainbow (playful), Soothing (mellow). DIY:
    "Music reactive jazz" and "A music reactive smoky" pulse to music; "Cyberpunk" is
    glitchy neon; "A vintage lava lamp" is a slow retro drift. For a plain solid color,
    control the light directly instead of using this.
  fields:
    effect:
      name: Effect
      description: >-
        Which preset to run. "Music-reactive:" options react to sound in real time, and
        the two "music reactive" DIY scenes do too (baked in); everything else is static.
      required: true
      selector:
        select:
          options:
          - "Sunset"
          - "Aurora"
          - "Fire"
          - "Ocean"
          - "Rainbow"
          - "Soothing"
          - "Music reactive jazz"
          - "A music reactive smoky"
          - "Cyberpunk"
          - "A vintage lava lamp"
          - "Music-reactive: Energetic"
          - "Music-reactive: Rhythm"
          - "Music-reactive: Spectrum"
          - "Music-reactive: Rolling"
  sequence:
  - variables:
      diy_scenes:
        - "Music reactive jazz"
        - "A music reactive smoky"
        - "Cyberpunk"
        - "A vintage lava lamp"
  - choose:
    # Live music-reactive mode: enable the reactive switch + pick the style.
    - conditions:
      - "{{ effect.startswith('Music-reactive:') }}"
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.cube_light_music_mode
      - action: select.select_option
        target:
          entity_id: select.cube_light_music_mode
        data:
          option: "{{ effect | replace('Music-reactive: ', '') | replace('Energetic', 'Energic') }}"
    # DIY scene: reactivity (if any) is baked into the scene, so keep the separate
    # music-mode switch OFF or it would override the DIY look.
    - conditions:
      - "{{ effect in diy_scenes }}"
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.cube_light_music_mode
      - action: select.select_option
        target:
          entity_id: select.cube_light_diy_scene
        data:
          option: "{{ effect }}"
    # Mood scene.
    default:
    - action: switch.turn_off
      target:
        entity_id: switch.cube_light_music_mode
    - action: select.select_option
      target:
        entity_id: select.cube_light_scene
      data:
        option: "{{ effect }}"
  mode: single

# --- Sound effects ---------------------------------------------------------------
# Short stinger SFX played through the JUKEBOX speaker (media_player.jukebox), NOT the
# voice-assistant media player — playing SFX to the VA speaker breaks wake-word/assist
# listening. Files live in /media/sounds/effects/ on the box (free-to-use, sourced from
# Wikimedia Commons; see CREDITS.txt there for per-file license/attribution). Addressed
# via the media_source local scheme the cube already uses for its chimes.

play_sound_effect:
  alias: Play Sound Effect
  description: >-
    Fire a short sound effect / stinger through the cube's jukebox speaker for comic or
    dramatic punctuation. Use sparingly — as an accent, not background. Pick one of the
    available effects.
  fields:
    effect:
      name: Effect
      description: Which sound effect to play
      required: true
      selector:
        select:
          options:
          - "Applause"
          - "Laugh Track"
          - "Cymbal Crash"
          - "Explosion"
          - "Cha-Ching (Cash Register)"
          - "Typewriter Ding"
          - "Bell Ding"
          - "Referee Whistle"
          - "Wind Chime"
          - "Cowbell"
          - "Alarm Clock"
          - "Cat Meow"
          - "Dog Bark"
          - "Rooster Crow"
          - "Sheep Bleat"
  sequence:
  - variables:
      files:
        "Applause": applause.mp3
        "Laugh Track": laugh.mp3
        "Cymbal Crash": cymbal_crash.mp3
        "Explosion": explosion.mp3
        "Cha-Ching (Cash Register)": cash_register.mp3
        "Typewriter Ding": typewriter.mp3
        "Bell Ding": bell_ding.mp3
        "Referee Whistle": whistle.mp3
        "Wind Chime": wind_chime.mp3
        "Cowbell": cowbell.mp3
        "Alarm Clock": alarm_clock.mp3
        "Cat Meow": cat_meow.mp3
        "Dog Bark": dog_bark.mp3
        "Rooster Crow": rooster.mp3
        "Sheep Bleat": sheep.mp3
  - action: media_player.play_media
    target:
      entity_id: media_player.jukebox
    data:
      media_content_type: music
      media_content_id: "media-source://media_source/local/sounds/effects/{{ files[effect] }}"
  mode: single

# --- Persona switching -------------------------------------------------------
# Two ways to change the cube's active persona. Both write input_select.current_persona,
# which the "Persona Switcher" automation watches to swap the Assist voice pipeline — so
# neither script needs to touch the pipeline itself. `persona` is optional; omit it to pick
# a random one (excluding whoever is current). The Rails random-rotation job calls
# set_persona_grand; set_persona_quick is the fanfare-free path for dev/manual/Assist use.

set_persona_quick:
  alias: Set Persona (quick)
  description: >-
    Switch the cube's active persona with NO fanfare — just change who's in charge.
    This is the lightweight path for dev/manual switches and (eventually) direct Assist
    requests like "let me talk to Buddy again". Give a `persona`, or omit it to pick a
    random one (never the current persona). For the full arrival ceremony use
    set_persona_grand instead.
  fields:
    persona:
      name: Persona
      description: Which persona to switch to. Omit for a random pick.
      required: false
      example: buddy
      selector:
        select:
          options:
          - buddy
          - jax
          - zorp
          - crash
          - neon
  sequence:
  - variables:
      target: >-
        {{ persona | default('', true) or
           (state_attr('input_select.current_persona', 'options')
            | reject('eq', states('input_select.current_persona')) | list | random) }}
  - action: input_select.select_option
    target:
      entity_id: input_select.current_persona
    data:
      option: "{{ target }}"
  # Light touch so a manual switch is visible on the sign. (Add an SFX here later if wanted.)
  - action: script.awtrix_marquee_message
    data:
      message: "{{ target | upper }}"
      duration: 8
  mode: single

set_persona_grand:
  alias: Set Persona (grand entrance)
  description: >-
    Switch the cube's active persona WITH the full arrival ceremony — the new persona
    makes a scene. This is what the Rails random-rotation job calls when the cube changes
    personas on its own. Give a `persona`, or omit it to pick a random one (never the
    current persona). For a quiet dev/Assist switch use set_persona_quick instead.
  fields:
    persona:
      name: Persona
      description: Which persona to switch to. Omit for a random pick.
      required: false
      example: jax
      selector:
        select:
          options:
          - buddy
          - jax
          - zorp
          - crash
          - neon
  sequence:
  - variables:
      target: >-
        {{ persona | default('', true) or
           (state_attr('input_select.current_persona', 'options')
            | reject('eq', states('input_select.current_persona')) | list | random) }}
  - action: input_select.select_option
    target:
      entity_id: input_select.current_persona
    data:
      option: "{{ target }}"
  # --- GRAND ENTRANCE (skeleton — flesh out per persona) ---
  - action: script.awtrix_marquee_message
    data:
      message: "{{ target | upper }} HAS ENTERED THE CUBE"
      duration: 15
  # TODO: stinger / sound effect       -> script.play_sound_effect  (effect: ...)
  # TODO: theme lighting               -> script.set_cube_light_effect  (effect: ...)
  # TODO: per-persona theme song       -> script.play_music_on_jukebox  (query: ...)
  # TODO: spoken arrival announcement  -> per-persona line via TTS / loudspeaker_announcement
  mode: single

