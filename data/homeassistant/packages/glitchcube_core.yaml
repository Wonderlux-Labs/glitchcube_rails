# GlitchCube core input helpers
# Rails reads/writes these to drive persona, mode, and dynamic host routing.
#
# CURRENTLY NOT USED (kept for future use, nothing reacts to them today):
#   - input_select.cube_mode — the rest-mode scripts SET it (low_power while offline,
#     conversation on wake) as a status flag, but nothing READS it to change behavior yet.
#   - input_text.glitchcube_breaking_news — reserved; not read or written anywhere.

input_select:
  current_persona:
    name: Current Persona
    # Only personas that are actually in rotation (have a voice + persona_prompt).
    # sparkle / thecube / mobius are inactive (see their YAMLs) — re-add here if revived.
    options:
      - buddy
      - jax
      - zorp
      - crash
      - neon
    initial: buddy
    icon: mdi:robot

  cube_mode:
    name: Cube Mode
    options:
      - conversation
      - performance
      - low_power
      - maintenance
    initial: conversation
    icon: mdi:cube-outline

input_text:
  glitchcube_host:
    name: GlitchCube Host
    initial: "192.168.68.50:4567"
    max: 100
    icon: mdi:server-network

  backend_health_status:
    name: Backend Health Status
    initial: "unknown"
    max: 255
    icon: mdi:heart-pulse

  glitchcube_breaking_news:
    name: Breaking News
    initial: "[]"
    max: 255
    icon: mdi:newspaper

  # The cube's scrolling marquee. The brain emits plain-English `marquee` actions
  # (e.g. "scroll JAX DOESN'T PLAY THAT"); expose this to the HASS action agent and
  # it will set the value here. Later an automation mirrors this to the ESP32 LED grid.
  # Friendly name is "Marquee Text" so the agent maps marquee instructions onto it.
  marquee_text:
    name: Marquee Text
    initial: ""
    max: 255
    icon: mdi:message-text-outline

  # What the cube's camera currently sees. Rails owns the pipeline now:
  # CameraDescriptionJob (on the Rails host, where the webcam is plugged in) grabs a
  # one-shot ffmpeg frame, runs it through a vision model, and writes the short
  # description here; ContextBuilder injects it into the brain's prompt (below the world
  # state) whenever it's non-empty. The "Camera: clear stale description" automation
  # blanks it after ~3 min so a stale look never lingers. Short-lived on purpose — we
  # don't analyze the camera continuously (vision calls cost money).
  current_camera_state:
    name: "Current Camera State"
    initial: ""
    max: 255
    icon: mdi:cctv

# Placeholder controls for the `switches` tool. They don't drive real hardware yet —
# exposing them just lets us see the action agent flip them. Wire up behavior later.
input_boolean:
  usb_charger:
    name: "USB Charger"
    icon: mdi:usb-port
  strobe_light:
    name: "Strobe Light"
    icon: mdi:flash

  # Diagnostic toggle for the "Top light: turn indicator (blink test)" automation.
  # While ON, the Govee top light (light.top_light) blinks off->1s->on when the
  # assist satellite enters 'listening' and 'processing', so we can eyeball whether
  # the cloud-controlled Govee lands in tune with the turn (the marquee + voice ring
  # already show LISTENING/THINKING instantly). Flip OFF to silence the experiment;
  # delete both this and the automation once we've decided keep/refine/drop.
  top_light_turn_indicator:
    name: "Top light turn indicator (blink test)"
    initial: true
    icon: mdi:lightbulb-alert

  # Master enable for the alpha "Presence: nudge idle visitor" automation. When ON and
  # someone lingers in front of the cube without starting a conversation, the cube nudges
  # them (marquee hint + a persona-voice call-out). Flip OFF to silence the nudge entirely.
  presence_nudge_enabled:
    name: "Presence nudge (idle visitor)"
    initial: true
    icon: mdi:account-alert

  # HASS-side kill switch for the camera pipeline. CameraDescriptionJob checks this
  # before every capture, so automations (a nighttime timer, an event mode, whatever)
  # can turn the cube's look off without touching Rails. Rails has its own independent
  # switch (DISABLE_CAMERA / config.disable_camera); either being on disables the camera.
  disable_camera:
    name: "Disable Camera"
    initial: false
    icon: mdi:camera-off

  # Raised by Rails for the duration of a grand-entrance persona switch
  # (Shows::GrandEntrance) — guaranteed to drop even if the show crashes. Listeners:
  # the "Persona switching: silence during the show" automation (mutes the mic +
  # stops the media players while up, unmutes when it drops) and the mic-guard
  # automation (keeps its hands off the mute switch while this is on). Hang more
  # show-time behavior here as it comes up.
  persona_switching:
    name: "Persona Switching (show in progress)"
    initial: false
    icon: mdi:drama-masks

  # Quiet-hours master switch. When ON, the cube keeps its volume down:
  # (1) the "Quiet mode: auto-duck jukebox" automation caps
  #     media_player.jukebox_internal at quiet_mode_max_volume (below), and
  # (2) Rails' HostAudio caps its own direct host playback (ffplay/say) to the
  #     same percentage — see app/services/host_audio.rb.
  # OFF (or absent) = no ducking anywhere. Toggle it from an automation later if a
  # placement actually enforces quiet hours (<80 dB @ 40 ft); we don't write that
  # automation yet.
  quiet_mode:
    name: "Quiet Mode"
    initial: false
    icon: mdi:volume-low

  # Raised while the cube is asleep during an internet outage (set by
  # script.enter_rest_mode, cleared by script.wake_from_rest). Gates the two
  # connectivity automations (automations/connectivity/) so they can't double-fire,
  # and is the flag the wake path keys off. Connectivity itself is the built-in
  # `ping` integration's binary_sensor.internet. Starts off; if HA reboots mid-outage
  # the down automation's /5-min re-assert re-establishes rest.
  internet_resting:
    name: "Internet Resting (cube asleep, offline)"
    initial: false
    icon: mdi:sleep

  # Set ON (first action) by script.set_cube_lights the instant a brain light command
  # arrives; read at end-of-speech by the "Cube Expression" automation to decide
  # keep-the-new-look vs restore-the-pre-turn snapshot; reset OFF at each turn start.
  # Setting it BEFORE the deferral wait is deliberate: the turn-end restore and the
  # script's wait release on the SAME media-stop event, so the flag must already be set.
  cube_light_command_this_turn:
    name: "Cube light command landed this turn"
    initial: false
    icon: mdi:lightbulb-on-outline

input_number:
  # The volume cap (percent, 0-100) applied everywhere while quiet_mode is ON.
  # Read by the auto-duck automation and by Rails' HostAudio. Tune it live to find
  # the level that clears the dB limit at the actual placement.
  quiet_mode_max_volume:
    name: "Quiet Mode Max Volume"
    initial: 50
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: slider
    icon: mdi:volume-medium

  # --- Conversation stats -------------------------------------------------------
  # Pushed every 5 min by Rails' Recurring::System::ConversationStatsJob (read-only
  # dashboards; nothing on the HASS side writes these). A "conversation" is one
  # Conversation session; a "round" is one logged turn (ConversationLog row).
  # mode: box with a high max so large lifetime totals aren't clamped.
  conversations_total:
    name: "Conversations (total)"
    initial: 0
    min: 0
    max: 1000000
    step: 1
    mode: box
    icon: mdi:forum
  rounds_total:
    name: "Conversation Rounds (total)"
    initial: 0
    min: 0
    max: 10000000
    step: 1
    mode: box
    icon: mdi:message-reply-text
  conversations_last_6h:
    name: "Conversations (last 6h)"
    initial: 0
    min: 0
    max: 1000000
    step: 1
    mode: box
    icon: mdi:forum
  rounds_last_6h:
    name: "Conversation Rounds (last 6h)"
    initial: 0
    min: 0
    max: 10000000
    step: 1
    mode: box
    icon: mdi:message-reply-text
  conversations_last_1h:
    name: "Conversations (last 1h)"
    initial: 0
    min: 0
    max: 1000000
    step: 1
    mode: box
    icon: mdi:forum
  rounds_last_1h:
    name: "Conversation Rounds (last 1h)"
    initial: 0
    min: 0
    max: 10000000
    step: 1
    mode: box
    icon: mdi:message-reply-text

input_button:
  trigger_alarm:
    name: "Trigger Alarm"
    icon: mdi:alarm-light
