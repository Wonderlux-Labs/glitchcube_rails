# M5Stack Core2 status screen — HA helpers.
#
# These three helpers drive the ESPHome `cube-screen` device (see
# data/esphome/cube-screen.yaml). The firmware subscribes to them by entity_id and
# renders the screen; HA writes them from automations / scripts / the brain.
#
#   input_text.m5_screen_text   — text / caption line (empty = no text)
#   input_text.m5_screen_emoji  — single mood emoji (drawn big; text becomes its caption)
#   input_text.m5_screen_color  — background colour: a name (red/green/blue/yellow/
#                                 orange/purple/cyan/pink/white) or "#RRGGBB"; empty = black.
#                                 Foreground auto-contrasts.
#
# To BLANK the screen, clear the text + emoji (and optionally colour) — there's no separate
# blank flag; empty inputs leave just the background.
#
# EMOJI must be the actual glyph (e.g. 🤖), NOT a name, and ONLY these baked-in glyphs
# render — anything else draws blank (firmware logs "Codepoint … not found"). To add more,
# extend the `glyphs:` list in data/esphome/cube-screen.yaml and reflash. Current set:
#   Faces:  😀 😃 😄 😁 😆 😅 😂 🙂 😉 😊 😎 🥳 😍 🤩 😜 🤪 😏 😝 🤭 🥰 😐 🤔 🧐 😶 🙄 😌 😴 🥱
#           😢 😭 😔 😟 🙁 😞 😠 😡 🤬 😤 😮 😲 😱 😨 🤯 🤒 🤢
#   Chars:  😈 👿 🤖 👻 👽 💀
#   Symbols: 🔥 ✨ ⭐ 💯 ⚡ 🧡 💛 💚 💙 💜 👂 🎧 💭 ⚠ 🚫 🕺 💃 🎵 🎶 🎉 🎊 ❌ ✅ ✔ 👍
#
# Suggested state → emoji (for automations):
#   listening 👂 / 🎧   thinking 🤔 / 💭   error ⚠ / ❌ / 🚫   dance 🕺 / 💃
#   music 🎵 / 🎶   party 🥳 / 🎉 / 🎊   ok/yes ✅ / ✔ / 👍   no/X ❌
# (Send the bare glyph; ⚠️/✔️ with a variation selector still render — the selector is
#  just skipped with a harmless "Codepoint not found" log line.)
#
# NOTE: these were first created live via the HA API (they exist in .storage). When this
# package is loaded on that same instance, delete the .storage copies first, otherwise HA
# suffixes the YAML entities (input_text.m5_screen_text_2, …) and the device stops matching.

input_text:
  m5_screen_text:
    name: M5 Screen Text
    initial: "GlitchCube ready"
    max: 255
    icon: mdi:format-text

  m5_screen_emoji:
    name: M5 Screen Emoji
    initial: "🤖"
    max: 8
    icon: mdi:emoticon-outline

  m5_screen_color:
    name: M5 Screen Color
    initial: ""
    max: 16
    icon: mdi:palette
