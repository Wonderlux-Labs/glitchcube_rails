# GlitchCube — HASS -> Rails triggers
#
# The mirror direction of the custom conversation component (which calls INTO
# Rails for speech): these rest_commands let HASS automations poke Rails to DO
# things on the host. Rails' address is dynamic — the host-registration job
# writes it to input_text.glitchcube_host — so we template the URL off that
# entity, appending the default port (4567) only when the value doesn't already
# carry one (same rule the custom component uses).
#
# Call from an automation with e.g.  action: rest_command.glitchcube_play_theme_song
# Test it from Developer Tools > Actions the same way.
#
# All of these land on ONE Rails controller (Api::V1::HomeAssistantWebhookController,
# routed under /api/v1/hass/*) — add new HASS->Rails triggers there, not a new
# controller per action.

rest_command:
  # Play a random theme song out the cube's host speaker (fire-and-forget on the
  # Rails side — the endpoint enqueues a job and returns immediately). Intended
  # for an idle-attractor automation: when the cube has been quiet a long while,
  # blast a song to draw people over. That automation isn't written yet.
  glitchcube_play_theme_song:
    url: >-
      http://{{ states('input_text.glitchcube_host') | trim }}{{ '' if ':' in states('input_text.glitchcube_host') else ':4567' }}/api/v1/hass/theme_song
    method: POST
    content_type: "application/json"
    payload: "{}"

  # Bring a persona onto the cube with a full grand entrance (Shows::GrandEntrance
  # on the Rails side: anomaly VO, lights, theme song, arrival announce).
  # Fire-and-forget — the endpoint kicks off the show and returns. Optional
  # `persona` names who takes over; omit it (blank) and Rails picks a random persona
  # that avoids the current cube-dominator and the previous session's persona.
  # Callers: the "internet back up" recovery automation (no persona) and
  # script.hand_off_the_cube (a persona giving up its turn, optional persona).
  glitchcube_grand_entrance:
    url: >-
      http://{{ states('input_text.glitchcube_host') | trim }}{{ '' if ':' in states('input_text.glitchcube_host') else ':4567' }}/api/v1/hass/grand_entrance
    method: POST
    content_type: "application/json"
    payload: '{"persona": "{{ persona | default("", true) }}"}'

  # A quick glitch fit (Shows::GlitchShort on the Rails side): one short
  # glitch-radio stab out the host speaker while the WLED strips spasm, for as
  # long as the clip runs. Saves the light state first and restores it after;
  # mic muted for the duration. Fire-and-forget.
  glitchcube_glitch_short:
    url: >-
      http://{{ states('input_text.glitchcube_host') | trim }}{{ '' if ':' in states('input_text.glitchcube_host') else ':4567' }}/api/v1/hass/glitch_short
    method: POST
    content_type: "application/json"
    payload: "{}"

  # The extended glitch-out (Shows::GlitchLong): a long static bed, a short stab,
  # then another long bed (~45-85s) with the WLED strips glitching throughout.
  # Saves + restores the lights; mic muted throughout. Fire-and-forget.
  glitchcube_glitch_long:
    url: >-
      http://{{ states('input_text.glitchcube_host') | trim }}{{ '' if ':' in states('input_text.glitchcube_host') else ':4567' }}/api/v1/hass/glitch_long
    method: POST
    content_type: "application/json"
    payload: "{}"

  # LAST-RESORT self-heal: ask Rails to gracefully restart its whole backend stack
  # (bin/glitchcube-ctl restart → launchd KeepAlive respawns Puma + jobs). Only lands
  # while Puma still answers HTTP, so it heals the "jobs wedged / degraded but web is
  # up" case (if Rails is fully down this simply fails, harmlessly). Rails throttles
  # honored restarts (10 min cooldown, survives the reboot) so this can't boot-loop.
  # Caller: the backend_restart_watchdog automation. Optional `reason` is logged.
  glitchcube_restart_backend:
    url: >-
      http://{{ states('input_text.glitchcube_host') | trim }}{{ '' if ':' in states('input_text.glitchcube_host') else ':4567' }}/api/v1/hass/restart
    method: POST
    content_type: "application/json"
    payload: '{"reason": "{{ reason | default("", true) }}"}'
