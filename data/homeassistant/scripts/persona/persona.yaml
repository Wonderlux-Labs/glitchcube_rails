# --- Persona switching -------------------------------------------------------
# The quick, fanfare-free persona switch. It writes input_select.current_persona,
# which the "Persona Switcher" automation watches to swap the Assist voice pipeline —
# so the script needs not touch the pipeline itself. `persona` is optional; omit it to
# pick a random one (excluding whoever is current).
#
# The GRAND entrance (anomaly VO, theme song, marquee, arrival announcement) is NOT a
# HASS script anymore — it's Rails-side (Shows::GrandEntrance), sequenced in Ruby with
# audio played straight off the Rails host. Rails raises input_boolean.persona_switching
# for the duration, as a hook for any HASS-side automations that want to react.

set_persona_quick:
  alias: Set Persona (quick)
  description: >-
    Quietly switch the cube's active persona — no fanfare, just change who's in charge.
    Give a `persona`, or omit it to pick a random one (never the current persona).
  fields:
    persona:
      name: Persona
      description: Which persona to switch to. Omit for a random pick.
      required: false
      example: buddy
      selector:
        select:
          options:
          - buddy
          - jax
          - zorp
          - crash
          - neon
  sequence:
  - variables:
      target: >-
        {{ persona | default('', true) or
           (state_attr('input_select.current_persona', 'options')
            | reject('eq', states('input_select.current_persona')) | list | random) }}
  - action: input_select.select_option
    target:
      entity_id: input_select.current_persona
    data:
      option: "{{ target }}"
  # Light touch so a manual switch is visible on the sign. (Add an SFX here later if wanted.)
  - action: script.awtrix_marquee_message
    data:
      message: "{{ target | upper }}"
      duration: 8
  mode: single

# --- Hand off the cube (grand entrance) --------------------------------------
# The theatrical persona switch: the current persona gives up its turn and hands the
# cube to another, who arrives with a full grand entrance. Exposed to Assist so a
# persona can trigger it in character. Fire-and-forget: it pokes Rails
# (rest_command.glitchcube_grand_entrance) and returns; the show runs async.
hand_off_the_cube:
  alias: Hand Off The Cube (grand entrance)
  description: >-
    Hand the cube to another persona, who takes over with a full grand entrance. Give a
    `persona` to name who takes over, or omit it for a random pick.
  fields:
    persona:
      name: Persona
      description: Which persona takes over the cube. Omit for a random pick.
      required: false
      example: neon
      selector:
        select:
          options:
          - buddy
          - jax
          - zorp
          - crash
          - neon
  sequence:
  - action: rest_command.glitchcube_grand_entrance
    data:
      persona: "{{ persona | default('', true) }}"
  mode: single
