# --- Cube WLED lighting (Assist-facing) ------------------------------------------
# The ONE addressable-LED control exposed to the Assist action agent. The cube's show
# LEDs are a single sound-reactive WLED strip on the cube's BODY (light.cube_body_wled).
# (The controller's second output — the old head strip — is unused and unexposed; the
# head cube is lit by the Voice PE's built-in LED ring, firmware-controlled.) The agent
# just picks an optional color + brightness and an effect; routing lives here so the
# agent only ever sees one lighting tool.
set_cube_lights:
  alias: Set Cube Lights
  description: >-
    The cube's main light control — the addressable RGB LED strip on its body, driven by a
    sound-reactive WLED controller. Use this for ANY look on the cube: a plain solid color,
    a mood, or an animated/audio-reactive effect. `color` is an RGB
    color and `brightness` is 1-100%; both are optional and, if omitted, are left unchanged.
    `effect` defaults to "Solid" — i.e. if you don't pass an effect you're just setting a
    solid RGB color. Pass any other effect name to animate. IMPORTANT: each call sets the
    COMPLETE look and effect resets to Solid when you don't specify one, so if you want to
    keep an animation running and only tweak color/brightness, pass that same effect again.
    Many effects are SOUND-REACTIVE and pulse to live audio from the mic — great while music
    is playing on the jukebox: Freqwave, Freqmatrix, Waterfall, Matripix, Gravcenter,
    Gravcentric, Gravfreq, DJ Light, Blurz, Puddlepeak, Pixelwave, Rocktaves, Midnoise,
    Noisemeter, "PS Sonic Stream", "PS Sonic Boom", "PS GEQ 1D". Some good picks by mood —
    CALM/AMBIENT: Breathe, Aurora, Pacifica, Lake, Colorwaves, Palette, Colorloop, Glitter,
    Twinkleup, "Slow Transition". PLAYFUL/COLORFUL: Rainbow, "Rainbow Runner", Colorful,
    "Chase Rainbow", "Pride 2015", "Sinelon Rainbow". WARM/FIRE: "Fire 2012", "Fire Flicker",
    Candle, "PS Fire 1D", Noisefire, Sunrise. PARTY/ENERGETIC: Strobe, "Blink Rainbow",
    Fireworks, "Fireworks Starburst", Plasma, Blends, "Dancing Shadows". EERIE/GLITCHY (on
    brand): "Halloween Eyes", ICU, "Noise 1", Phased, "Phased Noise", "TV Simulator",
    Lightning, Chunchun. The curated strip-friendly effect list has more if you want
    something else.
  fields:
    color:
      name: Color
      description: RGB color for the lights. Optional — omit to leave the current color
        unchanged (e.g. when you only want to change brightness or start an effect).
      selector:
        color_rgb:
    brightness:
      name: Brightness
      description: Overall brightness, 1-100 percent. Optional — omit to leave brightness
        unchanged.
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    effect:
      name: Effect
      description: Which WLED effect to run. Defaults to "Solid" (a plain solid color — pass
        this, or omit effect, when you just want a color). Any other value animates; many are
        sound-reactive. See the description for picks by mood.
      default: Solid
      selector:
        select:
          options:
          - Solid
          - Blink
          - Breathe
          - Wipe
          - Wipe Random
          - Random Colors
          - Sweep
          - Dynamic
          - Colorloop
          - Rainbow
          - Scan
          - Scan Dual
          - Fade
          - Theater
          - Theater Rainbow
          - Running
          - Saw
          - Twinkle
          - Dissolve
          - Dissolve Rnd
          - Sparkle
          - Sparkle Dark
          - Sparkle+
          - Strobe
          - Strobe Rainbow
          - Strobe Mega
          - Blink Rainbow
          - Android
          - Chase
          - Chase Random
          - Chase Rainbow
          - Chase Flash
          - Chase Flash Rnd
          - Rainbow Runner
          - Colorful
          - Traffic Light
          - Sweep Random
          - Chase 2
          - Aurora
          - Stream
          - Scanner
          - Lighthouse
          - Fireworks
          - Rain
          - Tetrix
          - Fire Flicker
          - Gradient
          - Loading
          - Rolling Balls
          - Fairy
          - Two Dots
          - Fairytwinkle
          - Running Dual
          - Image
          - Chase 3
          - Tri Wipe
          - Tri Fade
          - Lightning
          - ICU
          - Multi Comet
          - Scanner Dual
          - Stream 2
          - Oscillate
          - Pride 2015
          - Juggle
          - Palette
          - Fire 2012
          - Colorwaves
          - Bpm
          - Fill Noise
          - Noise 1
          - Noise 2
          - Noise 3
          - Noise 4
          - Colortwinkles
          - Lake
          - Meteor
          - Copy Segment
          - Railway
          - Ripple
          - Twinklefox
          - Twinklecat
          - Halloween Eyes
          - Solid Pattern
          - Solid Pattern Tri
          - Spots
          - Spots Fade
          - Glitter
          - Candle
          - Fireworks Starburst
          - Fireworks 1D
          - Bouncing Balls
          - Sinelon
          - Sinelon Dual
          - Sinelon Rainbow
          - Popcorn
          - Drip
          - Plasma
          - Percent
          - Ripple Rainbow
          - Heartbeat
          - Pacifica
          - Candle Multi
          - Solid Glitter
          - Sunrise
          - Phased
          - Twinkleup
          - Noise Pal
          - Sine
          - Phased Noise
          - Flow
          - Chunchun
          - Dancing Shadows
          - Washing Machine
          - Blends
          - TV Simulator
          - Dynamic Smooth
          - Pixels
          - Pixelwave
          - Juggles
          - Matripix
          - Gravimeter
          - Plasmoid
          - Puddles
          - Midnoise
          - Noisemeter
          - Freqwave
          - Freqmatrix
          - Waterfall
          - Freqpixels
          - Noisefire
          - Puddlepeak
          - Noisemove
          - Perlin Move
          - Ripple Peak
          - PacMan
          - Freqmap
          - Gravcenter
          - Gravcentric
          - Gravfreq
          - DJ Light
          - Shimmer
          - Blurz
          - Flow Stripe
          - Wavesins
          - Rocktaves
          - PS DripDrop
          - PS Pinball
          - PS Dancing Shadows
          - PS Fireworks 1D
          - PS Sparkler
          - PS Hourglass
          - PS Spray 1D
          - PS 1D Balance
          - PS Chase
          - PS Starburst
          - PS GEQ 1D
          - PS Fire 1D
          - PS Sonic Stream
          - PS Sonic Boom
          - PS Springy
          - Color Clouds
          - Slow Transition
  sequence:
  # Hold the light change until the cube stops speaking so it lands with (not under) the
  # words. Key off the VOICE media player, not the satellite 'responding' state — the
  # firmware blips responding->idle->listening mid-speech, which would release too early.
  # Outside a conversation the media player isn't playing, so this passes through instantly.
  - wait_template: "{{ not is_state('media_player.cube_cube_voice_media_player', 'playing') }}"
    timeout: "00:00:25"
    continue_on_timeout: true
  - action: light.turn_on
    target:
      entity_id: light.cube_body_wled
    # Build the payload: always set the effect (Solid by default), and only include
    # color/brightness when the caller actually passed them so we don't clobber them.
    data: >-
      {{ {'effect': effect | default('Solid', true)}
         | combine({'rgb_color': color} if (color is defined and color) else {})
         | combine({'brightness_pct': brightness | int} if (brightness is defined and brightness is not none) else {}) }}
  # queued so back-to-back calls run in order instead of dropping one.
  mode: queued
  max: 10
