# --- Cube WLED lighting (Assist-facing) ------------------------------------------
# The ONE addressable-LED control exposed to the Assist action agent. The cube's show
# LEDs are a single sound-reactive WLED controller with two outputs: the HEAD strip
# (~30 LEDs, light.glitch_head_wled) and the BODY strip (~60 LEDs, light.cube_body_wled).
# This script hides that plumbing — the agent just picks a strip (both/head/body), an
# optional color + brightness, and an effect. `both` fans the SAME command out to head
# and body in one call; to give them different looks, call the script twice (once with
# led_strip: head, once with led_strip: body). Routing/mapping lives here so the agent
# only ever sees one lighting tool. NOT the top light — that's internal (see below).
set_cube_lights:
  alias: Set Cube Lights
  description: >-
    The cube's main light control — its addressable RGB LEDs, split into a HEAD strip and a
    BODY strip driven by one sound-reactive WLED controller. Use this for ANY look on the
    cube's body/head: a plain solid color, a mood, or an animated/audio-reactive effect.
    Pick `led_strip`: "both" (default — same look on head and body), "head", or "body". To
    make the head and body DIFFERENT, call this twice, once per strip. `color` is an RGB
    color and `brightness` is 1-100%; both are optional and, if omitted, are left unchanged.
    `effect` defaults to "Solid" — i.e. if you don't pass an effect you're just setting a
    solid RGB color. Pass any other effect name to animate. IMPORTANT: each call sets the
    COMPLETE look and effect resets to Solid when you don't specify one, so if you want to
    keep an animation running and only tweak color/brightness, pass that same effect again.
    Many effects are SOUND-REACTIVE and pulse to live audio from the mic — great while music
    is playing on the jukebox: GEQ, Freqwave, Freqmatrix, Waterfall, Matripix, Gravcenter,
    Gravcentric, DJ Light, Blurz, Puddlepeak, Pixelwave, Rocktaves, Midnoise, Noisemeter,
    "PS Sonic Stream", "PS Sonic Boom", "PS GEQ 1D". Some good picks by mood — CALM/AMBIENT:
    Breathe, Aurora, Pacifica, Lake, Colorwaves, Palette, Colorloop, Glitter, Twinkleup,
    "Slow Transition". PLAYFUL/COLORFUL: Rainbow, "Rainbow Runner", Colorful, "Chase Rainbow",
    "Pride 2015", "Sinelon Rainbow". WARM/FIRE: "Fire 2012", "Fire Flicker", Candle, "PS Fire",
    "Sun Radiation", Sunrise. PARTY/ENERGETIC: Strobe, "Blink Rainbow", Fireworks,
    "Fireworks Starburst", Plasma, Blends, "Dancing Shadows". EERIE/GLITCHY (on brand):
    "Halloween Eyes", "Ghost Rider", "Black Hole", Matrix, "Noise 1", Phased,
    "Distortion Waves", Frizzles, Octopus, Soap. The full WLED effect catalog is in the
    effect list if you want something else.
  fields:
    led_strip:
      name: LED strip
      description: Which part of the cube to light. "both" (default) sends the same look to
        head and body; "head" or "body" targets just one. Call twice to differ them.
      default: both
      selector:
        select:
          options:
          - both
          - head
          - body
    color:
      name: Color
      description: RGB color for the lights. Optional — omit to leave the current color
        unchanged (e.g. when you only want to change brightness or start an effect).
      selector:
        color_rgb:
    brightness:
      name: Brightness
      description: Overall brightness, 1-100 percent. Optional — omit to leave brightness
        unchanged.
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    effect:
      name: Effect
      description: Which WLED effect to run. Defaults to "Solid" (a plain solid color — pass
        this, or omit effect, when you just want a color). Any other value animates; many are
        sound-reactive. See the description for picks by mood.
      default: Solid
      selector:
        select:
          options:
          - Solid
          - Blink
          - Breathe
          - Wipe
          - Wipe Random
          - Random Colors
          - Sweep
          - Dynamic
          - Colorloop
          - Rainbow
          - Scan
          - Scan Dual
          - Fade
          - Theater
