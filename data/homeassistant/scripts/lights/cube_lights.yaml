  sequence:
  # Route the friendly both/head/body choice to the real WLED entities. `both` targets
  # them together so one call sets an identical look on head and body.
  - action: light.turn_on
    target:
      entity_id: >-
        {{ {'both': ['light.glitch_head_wled', 'light.cube_body_wled'],
            'head': ['light.glitch_head_wled'],
            'body': ['light.cube_body_wled']}.get(led_strip | default('both', true),
            ['light.glitch_head_wled', 'light.cube_body_wled']) }}
    # Build the payload: always set the effect (Solid by default), and only include
    # color/brightness when the caller actually passed them so we don't clobber them.
    data: >-
      {{ {'effect': effect | default('Solid', true)}
         | combine({'rgb_color': color} if (color is defined and color) else {})
         | combine({'brightness_pct': brightness | int} if (brightness is defined and brightness is not none) else {}) }}
  # queued so a quick head-call-then-body-call runs in order instead of dropping one.
  mode: queued
  max: 10
