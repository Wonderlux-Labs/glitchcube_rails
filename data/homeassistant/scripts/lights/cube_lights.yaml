          - Strobe
          - Strobe Rainbow
          - Strobe Mega
          - Blink Rainbow
          - Android
          - Chase
          - Chase Random
          - Chase Rainbow
          - Chase Flash
          - Chase Flash Rnd
          - Rainbow Runner
          - Colorful
          - Traffic Light
          - Sweep Random
          - Chase 2
          - Aurora
          - Stream
          - Scanner
          - Lighthouse
          - Fireworks
          - Rain
