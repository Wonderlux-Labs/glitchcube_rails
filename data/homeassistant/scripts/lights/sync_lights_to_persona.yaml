# --- Persona color sync ------------------------------------------------------
# The ONE place the persona->RGB map lives now (previously duplicated in the
# Persona Switcher automation's ring step). Applies the current persona's
# signature color to the cube's expressive lights: the body WLED strip (solid)
# and the Voice PE LED ring (rgb + full brightness; the ring has its own
# firmware effect set — it runs its own listening/processing animations — so we
# don't send it a WLED effect name). The Persona Switcher automation calls this
# on every persona change.
sync_lights_to_persona:
  alias: Sync Lights To Persona
  description: >-
    Set the body WLED strip (solid) and the Voice PE LED ring to the current
    persona's signature color. Called by the Persona Switcher automation; safe
    to call manually to re-assert the persona look.
  sequence:
  - variables:
      rgb: >-
        {{ {'buddy': [255,220,0], 'neon': [255,0,128], 'zorp': [160,0,255],
            'crash': [0,255,65], 'jax': [0,120,255]}
           .get(states('input_select.current_persona'), [255,255,255]) }}
  - action: light.turn_on
    target:
      entity_id: light.cube_body_wled
    data:
      rgb_color: "{{ rgb }}"
      brightness: 180
      effect: Solid
  - action: light.turn_on
    target:
      entity_id: light.cube_cube_voice_led_ring
    data:
      rgb_color: "{{ rgb }}"
      brightness: 255
  mode: single
