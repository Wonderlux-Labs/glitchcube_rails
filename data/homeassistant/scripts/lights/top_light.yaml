          - "Candy Cane"
          - "Valentine's Day"
          - "Heartbeat"
          - "Saint Patrick's Day"
          - "Easter Egg"
          - "Ghost"
          - "Mother's Hug"
          - "Christmas Baubles"
          - "Christmas Eve"
          - "Candy Cane B"
          - "Santa Hat"
          - "Christmas Stripe"
          - "Christmas Stripe B"
          - "Christmas Stripe C"
          - "Christmas Stripe D"
          - "Christmas Gift"
          - "Christmas Wreath"
          - "Snow House"
          - "Christmas Tree"
          - "Gingerbread Man"
          - "Christmas Stocking"
          - "Santa Claus"
          - "Grim Graveyard"
          - "Poison"
          - "Lightning Bats"
          - "Halloween Witches"
