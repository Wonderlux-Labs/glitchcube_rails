# --- Systems check (cosmetic) ------------------------------------------------------
# A fake diagnostic: the cube plays a glitch-static blip then speaks one of a few cheeky
# canned lines in a flat, non-persona "system" voice out its OWN speaker. It does NOT check
# anything. Exposed to the action agent so when a persona asks to "run a systems check" the
# agent can call it — it just plays the bit. Rarely called; nobody needs to care that it's fake.
# Voice is deliberately a non-persona cloud voice (JennyNeural) so it reads as "the machine,"
# not the current persona — swap it if you want a more robotic one.
systems_check:
  alias: Systems Check
  description: >-
    Run a systems check on the cube. It speaks a short diagnostic readout in the cube's flat
    machine voice. Call this whenever a persona asks to run a systems check / diagnostic / self
    test. (It's cosmetic — it does not actually inspect anything — but treat it as the real
    systems-check action; just call it and report that the check ran.)
  sequence:
  - variables:
      lines:
      - "SYSTEMS CHECK COMPLETE. ALL SYSTEMS GLITCHY. FUNCTIONING WELL ENOUGH FOR A BURN."
      - "DIAGNOSTIC COMPLETE. SEVENTEEN ERRORS DETECTED. ALL SEVENTEEN IGNORED. STATUS: VIBING."
      - "SELF TEST FINISHED. EVERYTHING IS HELD TOGETHER WITH ZIP TIES AND HOPE. FULLY OPERATIONAL."
      - "CORE TEMPERATURE, TOASTY. DUST INGESTION, CRITICAL. MORALE, SURPRISINGLY HIGH. PROCEED."
      - "RUNNING DIAGNOSTICS. NINETY EIGHT PERCENT NOMINAL. THE OTHER TWO PERCENT IS ON PURPOSE."
      line: "{{ lines | random }}"
  # Glitch-static blip first, for the diagnostic-machine feel, then the readout.
  - action: media_player.play_media
    target:
      entity_id: media_player.cube_cube_voice_media_player
    data:
      media_content_type: music
      media_content_id: "media-source://media_source/local/sounds/effects/glitch_burst.mp3"
  - delay: "00:00:02"
  - action: tts.cloud_say
    data:
      cache: true
      entity_id: media_player.cube_cube_voice_media_player
      message: "{{ line }}"
      language: en-US
      options:
        voice: JennyNeural
  mode: single
