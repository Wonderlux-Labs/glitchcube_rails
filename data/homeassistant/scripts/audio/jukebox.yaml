# Two play scripts for the jukebox — one for front-and-center SONGS, one for background/MOOD
# music. They're functionally the same (fuzzy-search a track and play it on
# media_player.jukebox_internal) except for volume and timing, and neither takes a volume
# field anymore: volume is HARDCODED per script and faded in, so the agent can't leave it in a
# weird state. (The jukebox_internal media player is still exposed, so the agent CAN nudge
# volume directly after the fact if it really wants to.)
#
#   play_song_on_jukebox       — vol 90, waits for the persona to stop speaking first, fades in.
#   play_mood_music_on_jukebox — vol 60, starts right away, fades in.
#
# Fade: set volume to 0, start playback, then ramp to target over ~3s (6 steps × 0.5s).

play_song_on_jukebox:
  alias: Play Song on Jukebox
  description: >-
    Play a front-and-center SONG on the jukebox — a track meant to take over the room. Volume
    is fixed at 90 and faded in over ~3s; it waits until the cube has finished speaking before
    it starts, so the song doesn't stomp the persona's own words. `query` is a fuzzy search —
    give it "Artist - Title" (e.g. "Nirvana - Smells Like Teen Spirit") or
    "Artist - Album - Title" to be precise; slightly-wrong titles are forgiving. `queue` is
    optional: default `replace` plays immediately, `replace_next` queues it as the next track.
  fields:
    query:
      name: Query
      description: The track to play, as "Artist - Title" (fuzzy match).
      required: true
      selector:
        text:
    queue:
      name: Queue
      description: replace (play now, default) or replace_next (queue as next).
      required: false
      selector:
        select:
          options:
          - replace
          - replace_next
      default: replace
  sequence:
  - variables:
      target: 0.9
  # Hold until the cube stops speaking so the song lands after the words, not over them.
  # Outside a conversation the VA media player isn't playing, so this passes through instantly.
  - wait_template: "{{ not is_state('media_player.cube_cube_voice_media_player', 'playing') }}"
    timeout: "00:00:25"
    continue_on_timeout: true
  - action: media_player.volume_set
    target:
      entity_id: media_player.jukebox_internal
    data:
      volume_level: 0
  - action: music_assistant.play_media
    target:
      entity_id:
      - media_player.jukebox_internal
    data:
      media_id: "{{ query }}"
      media_type: track
      enqueue: "{{ queue | default('replace', true) }}"
  # Fade 0 -> 90 over ~3s.
  - repeat:
      count: 6
      sequence:
      - delay: "00:00:00.5"
      - action: media_player.volume_set
        target:
          entity_id: media_player.jukebox_internal
        data:
          volume_level: "{{ (target * repeat.index / 6) | round(2) }}"
  mode: queued
  max: 5

play_mood_music_on_jukebox:
  alias: Play Mood Music on Jukebox
  description: >-
    Play quiet background / MOOD music on the jukebox — texture that sits UNDER the
    conversation, not a front-and-center song. Volume is fixed at 60 and faded in over ~3s,
    starting right away. `query` is a fuzzy search — build it into a specific real track
    ("Artist - Title"), not a genre. `queue` is optional: default `replace` plays immediately,
    `replace_next` queues it as the next track. Use this for "something ambient/under us / mood
    music"; use play_song_on_jukebox for an actual song to feature.
  fields:
    query:
      name: Query
      description: The track to play, as "Artist - Title" (fuzzy match).
      required: true
      selector:
        text:
    queue:
      name: Queue
      description: replace (play now, default) or replace_next (queue as next).
      required: false
      selector:
        select:
          options:
          - replace
          - replace_next
      default: replace
  sequence:
  - variables:
      target: 0.6
  - action: media_player.volume_set
    target:
      entity_id: media_player.jukebox_internal
    data:
      volume_level: 0
  - action: music_assistant.play_media
    target:
      entity_id:
      - media_player.jukebox_internal
    data:
      media_id: "{{ query }}"
      media_type: track
      enqueue: "{{ queue | default('replace', true) }}"
  # Fade 0 -> 60 over ~3s.
  - repeat:
      count: 6
      sequence:
      - delay: "00:00:00.5"
      - action: media_player.volume_set
        target:
          entity_id: media_player.jukebox_internal
        data:
          volume_level: "{{ (target * repeat.index / 6) | round(2) }}"
  mode: queued
  max: 5

search_jukebox:
  alias: Search Jukebox
  description: >-
    Search the jukebox catalog for tracks WITHOUT playing anything — use it to check what's
    available or pin down the exact track before you play it. `query` is required; optionally
    narrow with `artist` and/or `album`. Returns up to 5 matching tracks.
  fields:
    query:
      name: Query
      description: What to search for — a song title or keywords
      required: true
      example: "closing time tom waits"
      selector:
        text:
    artist:
      name: Artist
      description: Optional — restrict results to this artist
      required: false
      selector:
        text:
    album:
      name: Album
      description: Optional — restrict results to this album
      required: false
      selector:
        text:
  sequence:
  - action: music_assistant.search
    data: >-
      {{ {"config_entry_id": "01KW61TG3CGY2SHG5CH6WEKZMM", "limit": 5, "media_type": ["track"], "name": query}
         | combine({"artist": artist} if artist | default('') else {})
         | combine({"album": album} if album | default('') else {}) }}
    response_variable: results
  - stop: "search complete"
    response_variable: results
