# --- Idle attention (SFX + persona call-out) -------------------------------------
# Fired by the "Idle: attention ping" automation when the cube's been idle a while, to
# draw people over. Two scripts: a full persona voiced call-out (glitch blip + the persona's
# own cloud voice via tts.cloud_say) and a bare sound-effect. Both play out the cube's OWN speaker
# (media_player.cube_cube_voice_media_player), NOT the jukebox — there's no conversation in
# flight (the automation requires 3 min idle), so it can't step on a pipeline.
#
# SFX files live at /media/sounds/effects/glitch_*.mp3 on the box — glitchy radio-static
# "beep-bloops" (sourced from data/rails_media/glitch_efx/short, all <10s). persona_attention_announce
# plays a short one as a pre-chime then speaks; play_attention_sfx plays one straight through
# media_source. Persona -> Nabu Casa cloud voice mirrors the voice_id in each lib/prompts/personas/*.yml.

persona_attention_announce:
  alias: Persona Attention Announce
  description: >-
    Idle attention-grab: play a random "pay attention" sound effect as a pre-chime, then have
    the CURRENT persona say a short call-out in its own voice via chime_tts, out the cube's own
    speaker (not the jukebox). Briefly sparkles the body light in the persona color and restores
    whatever it was. Fire-and-forget from the idle-attention automation.
  sequence:
  - variables:
      persona: "{{ states('input_select.current_persona') }}"
      # Persona -> Nabu Casa cloud voice + locale. SOURCE OF TRUTH is the live Assist pipelines
      # on the box (select.cube_cube_voice_assistant → Buddy/Jax/Neon/Zorp/Crash pipeline's
      # tts_voice/tts_language), NOT the repo personas *.yml voice_id (those are stale). Keep
      # these in sync with the pipelines if the pipeline voices change.
      voice_map:
        buddy: { voice: "DavisNeural||chat", language: en-US }
        jax: { voice: SteffanNeural, language: en-US }
        neon: { voice: JaneNeural, language: en-US }
        zorp: { voice: ElliotNeural, language: en-GB }
        crash: { voice: LukeNeural, language: en-ZA }
      v: "{{ voice_map.get(persona, {'voice': 'JennyNeural', 'language': 'en-US'}) }}"
      rgb: >-
        {{ {'buddy': [255,220,0], 'neon': [255,0,128], 'zorp': [160,0,255],
            'crash': [0,255,65], 'jax': [0,120,255]}.get(persona, [255,255,255]) }}
      # Glitchy radio-static "beep-bloop" pre-chime. Shorter subset (<6s) so it doesn't drag
      # before the voice line. Files under /media/sounds/effects/ (from data/rails_media/glitch_efx).
      sfx_pool:
      - glitch_burst.mp3
      - glitch_sw.mp3
      - glitch_ringy.mp3
      - glitch_static.mp3
      - glitch_squeaky.mp3
      # Same random openers the old presence voice-nudge used (always ended with the wake hint).
      phrases:
      - "Hey — over here."
      - "Psst. Over here. The glowing cube."
      - "Yes, I'm talking. Cubes talk now."
      - "You look like you have questions."
      - "Don't be shy — I'm friendlier than I look."
      - "I see you. The cube sees all."
      - "Well? Come say hi."
      - "Bored? Me too."
      phrase: "{{ phrases | random }} Say 'Hey Glitch Cube' to wake me up."
  # Snapshot the body light so we can put it back exactly as it was after the sparkle.
  - action: scene.create
    data:
      scene_id: attention_light_restore
      snapshot_entities:
      - light.cube_body_wled
  - action: light.turn_on
    target:
      entity_id: light.cube_body_wled
    data:
      rgb_color: "{{ rgb }}"
      brightness_pct: 100
      effect: Sparkle
  # Pre-chime: play a short glitch blip, let it ring a moment, then the persona speaks. Both
  # go out the cube's own voice speaker; the cloud_say interrupts the tail of the blip (a
  # deliberate glitchy cut-to-voice). tts.cloud_say (legacy Nabu Casa cloud) — chime_tts's TTS
  # backend produced no audio on this box, but cloud_say works. cache:true caches each phrase.
  - action: media_player.play_media
    target:
      entity_id: media_player.cube_cube_voice_media_player
    data:
      media_content_type: music
      media_content_id: "media-source://media_source/local/sounds/effects/{{ sfx_pool | random }}"
  - delay: "00:00:02"
  - action: tts.cloud_say
    data:
      cache: true
      entity_id: media_player.cube_cube_voice_media_player
      message: "{{ phrase }}"
      language: "{{ v.language }}"
      options:
        voice: "{{ v.voice }}"
  # Hold the sparkle across the spoken line, then restore the body light to what it was.
  - delay: "00:00:04"
  - action: scene.turn_on
    target:
      entity_id: scene.attention_light_restore
  mode: single

play_attention_sfx:
  alias: Play Attention SFX
  description: >-
    Play a single random "pay attention" sound effect out the cube's own speaker (the VA media
    player, not the jukebox). Used by the idle-attention automation on the ~2-in-3 turns it
    doesn't do a full persona announce.
  sequence:
  - variables:
      # Glitchy radio-static "beep-bloop" pool (all <10s), from data/rails_media/glitch_efx.
      sfx_pool:
      - glitch_burst.mp3
      - glitch_sw.mp3
      - glitch_ringy.mp3
      - glitch_static.mp3
      - glitch_squeaky.mp3
      - glitch_grungy.mp3
      - glitch_am.mp3
      - glitch_sw4.mp3
      - glitch_lofi.mp3
      - glitch_schizoid.mp3
      - glitch_tuning.mp3
  - action: media_player.play_media
    target:
      entity_id: media_player.cube_cube_voice_media_player
    data:
      media_content_type: music
      media_content_id: "media-source://media_source/local/sounds/effects/{{ sfx_pool | random }}"
  mode: single
