- id: presence_announce_nudge
  alias: "Presence: announce nudge (voice call-out on arrival)"
  description: >-
    When someone shows up and lingers ~30s while the cube is idle, the current persona
    calls out in its own voice (assist_satellite.announce — speaks WITHOUT opening a
    listening session) to invite them to start a conversation. Fires once per arrival: it
    triggers on presence off->on, so a lingering visitor never re-announces, and a 3-minute
    debounce swallows brief presence flicker — so it won't call out again until the sensor
    has been clear for a few minutes and someone re-arrives. Gated by
    input_boolean.presence_nudge_enabled; guarded to satellite idle + not-persona-switching
    so it never talks over a turn or a show. Sensor: binary_sensor.presence_sensor
    (occupancy). The repeating VISUAL reminder lives in the separate "Presence: marquee
    nudge" automation.
  triggers:
  - trigger: state
    entity_id: binary_sensor.presence_sensor
    to: "on"
    for: "00:00:30"
  conditions:
  - "{{ is_state('input_boolean.presence_nudge_enabled', 'on') }}"
  - "{{ is_state('input_boolean.persona_switching', 'off') }}"
  # Don't re-announce within 3 min of the last one — swallows brief presence flicker so the
  # voice only fires on a genuine fresh arrival (sensor clear for a few minutes first).
  - "{{ this.attributes.last_triggered is none or (now() - this.attributes.last_triggered) > timedelta(minutes=3) }}"
  - condition: state
    entity_id: binary_sensor.presence_sensor
    state: "on"
  - condition: state
    entity_id: assist_satellite.cube_cube_voice_assist_satellite
    state: idle
    for: "00:00:30"
  actions:
  - action: assist_satellite.announce
    target:
      entity_id: assist_satellite.cube_cube_voice_assist_satellite
    data:
      message: "Hey — over here. Say 'Hey Glitch Cube' to wake me up."
  mode: single
