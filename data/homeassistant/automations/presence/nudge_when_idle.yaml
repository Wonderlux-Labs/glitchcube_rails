- id: presence_nudge_when_idle
  alias: "Presence: nudge idle visitor to start a conversation (alpha)"
  description: >-
    ALPHA / rough first cut — a place to hang this behavior. When the presence sensor has
    seen someone for a little while and the cube is just sitting idle (no conversation in
    progress), nudge them to start one: scroll a marquee hint and have the CURRENT persona
    call out in its own voice via assist_satellite.announce (which speaks WITHOUT opening a
    listening session — it uses the selected pipeline's TTS voice). Gated by
    input_boolean.presence_nudge_enabled so it's trivial to silence; guarded to satellite
    'idle' + not-persona-switching so it never talks over an active turn or a show. Re-fires
    each time someone re-enters (presence off->on->30s). Tune the delay, add a re-nudge
    cadence, or drop the voice half as needed. Sensor: binary_sensor.presence_sensor
    (device_class occupancy). Fires when BOTH have held for 30s: someone in range AND the
    satellite idle — whichever crosses 30s last is the trigger (so it also nudges after a
    conversation ends while the person is still standing there). Both durations checked as
    conditions too, so a trigger can't fire on a momentary state.
  triggers:
  - trigger: state
    entity_id: binary_sensor.presence_sensor
    to: "on"
    for: "00:00:30"
  - trigger: state
    entity_id: assist_satellite.cube_cube_voice_assist_satellite
    to: idle
    for: "00:00:30"
  conditions:
  - "{{ is_state('input_boolean.presence_nudge_enabled', 'on') }}"
  - "{{ is_state('input_boolean.persona_switching', 'off') }}"
  # 3-minute debounce: don't re-nudge if we nudged within the last 3 min — someone
  # lingering while idle would otherwise re-fire on every presence/idle state blip.
  # `this` = this automation's own state object, so there's no entity_id to keep in
  # sync. Tune the 3 min later (or lift it into a helper if we want it adjustable).
  - "{{ this.attributes.last_triggered is none or (now() - this.attributes.last_triggered) > timedelta(minutes=3) }}"
  - condition: state
    entity_id: binary_sensor.presence_sensor
    state: "on"
    for: "00:00:30"
  - condition: state
    entity_id: assist_satellite.cube_cube_voice_assist_satellite
    state: idle
    for: "00:00:30"
  actions:
  # Full-brightness, timed marquee via the AWTRIX script (it bumps BRI so the sign is
  # readable even when the idle screen is dimmed, then restores it) — a raw
  # marquee/notify with hold:false scrolled by unseen. script.turn_on = fire-and-forget
  # so the marquee's hold duration doesn't block the announce below.
  - action: script.turn_on
    target:
      entity_id: script.awtrix_marquee_message
    data:
      variables:
        message: 'SAY "HEY GLITCH CUBE" TO WAKE ME UP'
        color: "#00AEEF"
        duration: 30
  - action: assist_satellite.announce
    target:
      entity_id: assist_satellite.cube_cube_voice_assist_satellite
    data:
      message: "Hey — over here. Say 'Hey Glitch Cube' to wake me up."
  mode: single
