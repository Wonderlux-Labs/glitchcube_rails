- id: presence_marquee_nudge
  alias: "Presence: marquee nudge (repeating wake hint)"
  description: >-
    Scrolls a "say Hey Glitch Cube to wake me up" hint across the marquee every minute while
    a human is detected — OR whenever the presence sensor is unavailable/unknown, so people
    can still learn how to use the cube if the sensor is offline. The AWTRIX notification
    scrolls twice per showing and clears itself, so the sign returns to its idle screen
    between hints. Time-pattern driven (every minute) plus an immediate flash on a fresh arrival. Gated
    by input_boolean.presence_nudge_enabled; skipped during a persona switch and while the
    satellite is busy (mid-conversation) so it doesn't nag someone already talking. The
    one-shot VOICE call-out lives in the separate "Presence: announce nudge" automation.
  triggers:
  - trigger: time_pattern
    minutes: "/1"
  - trigger: state
    entity_id: binary_sensor.presence_sensor
    to: "on"
    for: "00:00:30"
  conditions:
  - "{{ is_state('input_boolean.presence_nudge_enabled', 'on') }}"
  - "{{ is_state('input_boolean.persona_switching', 'off') }}"
  # NEVER fire during a conversation — personas drive the marquee themselves then. The
  # firmware blips the satellite responding->idle->listening mid-response, so a bare
  # 'idle' check is unsafe; require idle held 30s (well past the ~10s "truly over" mark)
  # so no between-turn gap counts as idle. A conversation waiting on the visitor sits in
  # 'listening', not 'idle', so a multi-turn chat never trips this either.
  - condition: state
    entity_id: assist_satellite.cube_cube_voice_assist_satellite
    state: idle
    for: "00:00:30"
  # Someone's here, or the sensor is offline (so we can't tell — show the hint anyway).
  - "{{ is_state('binary_sensor.presence_sensor', 'on') or states('binary_sensor.presence_sensor') in ['unavailable', 'unknown'] }}"
  actions:
  # Fire-and-forget the timed, full-brightness marquee (the script bumps BRI so the hint is
  # readable over a dimmed idle screen, then restores it). It self-clears after `duration`.
  - action: script.turn_on
    target:
      entity_id: script.awtrix_marquee_message
    data:
      variables:
        message: 'SAY "HEY GLITCH CUBE" TO WAKE ME UP'
        color: "#00AEEF"
        duration: 30
        repeat: 2
  mode: single
