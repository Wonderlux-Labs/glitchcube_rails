- id: cube_idle_attention_ping
  alias: "Idle: attention ping (SFX / persona call-out)"
  description: >-
    Keep the cube from sitting dead-silent when nobody's engaging. Every 3 minutes, if the
    satellite has been idle 3 min (nobody talking) and we're not mid persona-switch or asleep,
    do one of two things: a 1-in-3 chance the CURRENT persona calls out in its own voice (a
    "pay attention" SFX pre-chime + a short line via chime_tts, out the cube's own speaker),
    else (2-in-3) just play a random attention SFX. Replaces the old presence voice-nudge and
    the idle glitch-show musing. Plays out media_player.cube_cube_voice (NOT the jukebox) —
    safe because the 3-min-idle gate means no conversation is happening.
  triggers:
  - trigger: time_pattern
    minutes: "/3"
  conditions:
  - "{{ is_state('input_boolean.persona_switching', 'off') }}"
  - "{{ is_state('input_boolean.internet_resting', 'off') }}"
  - condition: state
    entity_id: assist_satellite.cube_cube_voice_assist_satellite
    state: idle
    for: "00:03:00"
  actions:
  # 1-in-3 → full persona voiced call-out; otherwise just a sound effect.
  - choose:
    - conditions: "{{ (range(1, 4) | random) == 1 }}"
      sequence:
      - action: script.persona_attention_announce
    default:
    - action: script.play_attention_sfx
  mode: single
