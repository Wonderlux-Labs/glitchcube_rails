- id: cube_idle_body_light_reset
  alias: "Idle: reset body light to persona look"
  description: >-
    Personas thrash the body WLED during conversations — sound-reactive effects, odd
    brightness — and often leave it hard to see once they're done. Once the cube's been
    idle 3 minutes, snap the body strip back to a clean, VISIBLE look: full brightness,
    the current persona's signature color, and one of three motions (1/3 solid, 1/3 pulse,
    1/3 chase/scan). Then re-roll the motion every ~5 min while it stays idle so it's not
    a dead static block. Personas keep full control of the lights DURING a conversation —
    this only fires while the satellite has been idle a while. Skipped during a persona
    switch (the grand-entrance show owns the lights then). Colors match
    script.sync_lights_to_persona (the persona->RGB map).
  triggers:
  - trigger: time_pattern
    minutes: "/1"
  conditions:
  - "{{ is_state('input_boolean.persona_switching', 'off') }}"
  - condition: state
    entity_id: assist_satellite.cube_cube_voice_assist_satellite
    state: idle
    for: "00:03:00"
  # First reset at 3 min idle, then a fresh look every 5 min while still idle.
  - "{{ this.attributes.last_triggered is none or (now() - this.attributes.last_triggered) > timedelta(minutes=5) }}"
  actions:
  - variables:
      rgb: >-
        {{ {'buddy': [255,220,0], 'neon': [255,0,128], 'zorp': [160,0,255],
            'crash': [0,255,65], 'jax': [0,120,255]}
           .get(states('input_select.current_persona'), [255,255,255]) }}
      # 1 solid, 2 pulse, 3 chase/scan.
      roll: "{{ range(1, 4) | random }}"
      effect: >-
        {% if roll == 1 %}Solid
        {% elif roll == 2 %}Breathe
        {% else %}{{ ['Scan', 'Scanner', 'Chase', 'Running'] | random }}{% endif %}
  - action: light.turn_on
    target:
      entity_id: light.cube_body_wled
    data:
      rgb_color: "{{ rgb }}"
      brightness_pct: 100
      effect: "{{ effect | trim }}"
  mode: single
