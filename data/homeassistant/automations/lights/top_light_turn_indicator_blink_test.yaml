- id: top_light_turn_indicator_blink_test
  alias: "Top light: turn indicator (blink test)"
  description: >-
    DIAGNOSTIC. While input_boolean.top_light_turn_indicator is ON, blink the Govee top
    light off -> 1s -> back to the persona color when the assist satellite enters
    'listening' and 'processing'. Purpose: eyeball whether the CLOUD-controlled Govee
    lands in tune with the turn (the marquee + the local voice LED ring already show
    LISTENING/THINKING instantly, with no cloud lag). Skipped while the jukebox is
    playing so it doesn't stomp the sound-reactive look. Once we've judged the lag:
    either evolve this into a real cue (distinct listening vs thinking looks) or delete
    it and turn the boolean off. mode: restart so a fast listening->processing hop just
    re-blinks instead of queuing.
  triggers:
  - trigger: state
    entity_id: assist_satellite.cube_cube_voice_assist_satellite
    to: listening
  - trigger: state
    entity_id: assist_satellite.cube_cube_voice_assist_satellite
    to: processing
  conditions:
  - "{{ is_state('input_boolean.top_light_turn_indicator', 'on') }}"
  - "{{ not is_state('media_player.jukebox_internal', 'playing') }}"
  actions:
  - action: light.turn_off
    target:
      entity_id: light.top_light
  - delay: "00:00:01"
  - action: script.set_top_light_persona_color
    data: {}
  mode: restart
