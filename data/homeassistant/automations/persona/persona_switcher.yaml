- id: '1755313710558'
  alias: Persona Switcher
  description: >-
    When input_select.current_persona changes: (1) select the matching Assist
    pipeline on the Cube Voice device — pipelines all share one conversation
    agent (conversation.glitch_cube_neon) and differ only by TTS voice, so this
    is purely a voice swap; personas without their own pipeline fall back to
    "preferred". (2) Recolor the Voice PE LED ring to that persona's signature
    color at full brightness, so the ring identifies who's talking. The ring is
    otherwise the assistant's thinking/listening indicator and gets overridden
    freely during a turn — this just resets it to the persona's color on switch.
    (3) Set the Govee top light (light.top_light) to the SAME signature color as a
    solid ambient glow — the top light is internal-only (not exposed to Assist), so
    this automation owns its idle look. Swap in per-persona swirl DIY scenes later.
  triggers:
  - trigger: state
    entity_id:
    - input_select.current_persona
  - trigger: homeassistant
    event: start
  conditions: []
  actions:
  - action: select.select_option
    target:
      entity_id: select.cube_cube_voice_assistant
    data:
      option: >-
        {{ {'buddy': 'Buddy', 'jax': 'Jax', 'neon': 'Neon', 'zorp': 'Zorp', 'crash': 'Crash'}
           .get(states('input_select.current_persona'), 'preferred') }}
  # (2) Head + body strips + Voice PE ring -> persona signature color. The script owns the
  #     map (was inline here); it also gets called on HA start so a reboot re-asserts the look.
  - action: script.sync_lights_to_persona
  # (3) Govee top light — same signature color, solid, as the persona's ambient glow.
  #     Skip while the jukebox is playing so we don't stomp the sound-reactive look
  #     (the "Top light: sound-reactive with jukebox" automation restores the persona
  #     color when playback stops). script.set_top_light_persona_color owns the map.
  - if:
    - "{{ not is_state('media_player.jukebox_internal', 'playing') }}"
    then:
    - action: script.set_top_light_persona_color
  mode: single
