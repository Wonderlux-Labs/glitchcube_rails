# GlitchCube world-state composite sensor  (source of truth; deployed to
# HASS /config/templates/glitchcube_world_state.yaml)
#
# The cube's Rails brain reads the `content` attribute each turn and injects it
# into the persona prompt as ambient context. Templated entirely on the HASS
# side so that as more devices come online we just extend THIS template — no
# Rails change needed.
#
#   state   — short human summary (must stay < 255 chars for HASS)
#   content — a plain-English paragraph the brain reads verbatim
#
# Today it composites weather (current + forecast look-ahead from the sibling
# glitchcube_weather_forecast sensor) + time + day/night + lights + jukebox.
# Future: append motion, etc. right here as those devices come online.
#
# Lives in templates/ (not packages/) so it's a plain YAML file alongside
# automations.yaml/scripts.yaml — included via `template: !include_dir_merge_list
# templates/` in configuration.yaml. This is a bare list (no `template:` key)
# because !include_dir_merge_list merges the lists from every file in the
# directory into the one top-level `template:` key itself.

- sensor:
    - name: "GlitchCube World State"
      unique_id: glitchcube_world_state
      icon: mdi:earth
      state: >-
        {%- set w = states('weather.forecast_home') -%}
        {%- set t = state_attr('weather.forecast_home', 'temperature') -%}
        {%- if w in ['unknown', 'unavailable', none] -%}
          Weather unknown
        {%- else -%}
          {{ w | replace('_', ' ') | capitalize }}{% if t is not none %}, {{ t }}°F{% endif %}
        {%- endif -%}
      attributes:
        content: >-
          {#- Reusable hue -> plain color-name macro, used for every RGB light below. -#}
          {%- macro color_name(ent) -%}
            {%- set hs = state_attr(ent, 'hs_color') -%}
            {%- set hue = hs[0] if hs else 0 -%}
            {%- set sat = hs[1] if hs else 0 -%}
            {%- if sat < 12 -%}soft white
            {%- elif hue < 15 or hue >= 345 -%}red
            {%- elif hue < 45 -%}orange
            {%- elif hue < 70 -%}yellow
            {%- elif hue < 160 -%}green
            {%- elif hue < 200 -%}teal
            {%- elif hue < 260 -%}blue
            {%- elif hue < 290 -%}purple
            {%- else -%}pink{%- endif -%}
          {%- endmacro -%}
          {%- set w = states('weather.forecast_home') -%}
          {%- set t = state_attr('weather.forecast_home', 'temperature') -%}
          {%- set h = state_attr('weather.forecast_home', 'humidity') -%}
          {%- set ws = state_attr('weather.forecast_home', 'wind_speed') -%}
          {%- set daytime = is_state('sun.sun', 'above_horizon') -%}
          It is {{ now().strftime('%-I:%M %p') }} on {{ now().strftime('%A') }} and it is {{ 'daytime' if daytime else 'dark out' }}.
          {%- if w not in ['unknown', 'unavailable', none] %} The weather is {{ w | replace('_', ' ') }}{% if t is not none %}, around {{ t }}°F{% endif %}{% if h is not none %} with {{ h }}% humidity{% endif %}{% if ws is not none %} and winds near {{ ws | round }} mph{% endif %}.{% endif %}
          {#- Forecast look-ahead from the get_forecasts-backed sensor: precip chance if
              it's worth mentioning, plus tonight's low (by day) or tomorrow's high (by night). -#}
          {%- set pc = state_attr('sensor.glitchcube_weather_forecast', 'precip_chance') | int(0) -%}
          {%- set tlow = state_attr('sensor.glitchcube_weather_forecast', 'tonight_low') -%}
          {%- set thigh = state_attr('sensor.glitchcube_weather_forecast', 'tomorrow_high') -%}
          {%- if pc >= 20 %} There's about a {{ pc }}% chance of precipitation in the next day.{% endif -%}
          {%- if daytime and tlow not in [none, ''] %} Tonight's low will be around {{ tlow }}°F.
          {%- elif not daytime and thigh not in [none, ''] %} Tomorrow's high will be around {{ thigh }}°F.{% endif -%}
          {#- Your body light and head light — current look each: color + brightness percent,
              plus the running effect if one is active (any effect other than 'Solid'). -#}
          {%- for seg in [('light.cube_body_wled', 'body'), ('light.glitch_head_wled', 'head')] -%}
            {%- set ent = seg[0] -%}
            {%- set label = seg[1] -%}
            {%- if is_state(ent, 'on') -%}
              {%- set bri = state_attr(ent, 'brightness') or 255 -%}
              {%- set bripct = (bri / 255 * 100) | round -%}
              {%- set col = color_name(ent) | trim -%}
              {%- set fx = state_attr(ent, 'effect') -%}
              {%- if fx and fx not in ['Solid', 'None', 'none', 'unknown', 'unavailable'] -%}
                {{ ' Your ' ~ label ~ ' light is ' ~ col ~ ', running the "' ~ fx ~ '" effect, at ' ~ bripct ~ '% brightness.' }}
              {%- else -%}
                {{ ' Your ' ~ label ~ ' light is a solid ' ~ col ~ ', at ' ~ bripct ~ '% brightness.' }}
              {%- endif -%}
            {%- else %} Your {{ label }} light is off.{%- endif -%}
          {%- endfor -%}
          {#- The jukebox: track / artist / volume when actually playing, else quiet. It
              keeps stale media_title metadata while idle, so only trust it when playing. -#}
          {%- set jb = 'media_player.jukebox_internal' -%}
          {%- if is_state(jb, 'playing') -%}
            {%- set title = state_attr(jb, 'media_title') -%}
            {%- set artist = state_attr(jb, 'media_artist') -%}
            {%- set vol = state_attr(jb, 'volume_level') -%}
            {{ ' The jukebox is playing' ~ (' "' ~ title ~ '"' if title else '') ~ (' by ' ~ artist if artist else '') ~ (', at ' ~ (vol * 100) | round ~ '% volume' if vol is not none else '') ~ '.' }}
          {%- else %} The jukebox is quiet right now.{%- endif -%}
          {#- Marquee: only surface it if it looks offline, so a persona knows the sign is
              dead. When it's healthy, say nothing. -#}
          {%- if states('light.cube_awtrix_marquee_matrix') in ['unavailable', 'unknown', 'none'] %} (Heads up: your marquee sign appears to be offline right now.){%- endif -%}
