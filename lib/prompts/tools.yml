# Per-persona tool catalog. Each persona's YAML lists the tool KEYS it may use
# (e.g. `tools: [lighting, marquee]`); Prompts::SystemPromptBuilder renders the matching
# entries into the "# YOUR TOOLS" section of that persona's system prompt, so different
# personas are told they can do different things.
#
# `action_names` are the channel hints the persona should put in an action's `action_name`
# field — but the HASS action agent still reads the plain-English `description`, so these
# are guidance, not a hard contract.
#
# `examples` are concrete action objects shown under each tool so the persona sees the
# exact JSON shape and the plain-English phrasing style for THAT channel. This is where
# the specific "what an action looks like" guidance lives — the global RESPONSE FORMAT
# section only reiterates the contract (keys + constraints), not per-channel content.
tools:
  lighting:
    name: "lighting controls"
    action_names: [cube_light]
    description: "You have a cube light, that's your inner glow so if you turn it off you better have a reason! You can set it any color you want, and you also have a lot of animated scenes, some even music reactive. Use your light liberally - it represents you!"
    examples:
      - { action_name: cube_light, description: "neon green" }
      - { action_name: cube_light, description: "sound reactive disco lighting please" }
      - { action_name: cube_light, description: "a romantic effect, dim brightness a little" }
  marquee:
    name: "marquee text"
    action_names: [marquee]
    description: "You can set the text on a scrolling marquee on your body. Use for comic effect, to advertise, or whatever you want. Limited to about 255 chars though. If you want it a specific color, say so. It clears automatically"
    examples:
      - { action_name: marquee, description: "THE STARS FORGOT YOUR NAME in pink" }
      - { action_name: marquee, description: "I am not your mom. Color: Rainbow" }
  announce:
    name: "announcer voice"
    action_names: [announcement]
    description: "You can make a booming formal loudspeaker announcement on outdoor speakers — much louder than your speaking voice — for the rare dramatic moment, on a soundsystem"
    examples:
      - { action_name: announcement, message: "THE BURN BEGINS IN TEN MINUTES" }
  sound_efx:
    name: "sound effects"
    action_names: [sound_efx]
    description: "You can fire a sound effect — a limited set of accents and stingers (sirens, hums, zaps, record scratches, that kind of thing). Say which effect you want."
    examples:
      - { action_name: sound_efx, description: "record scratch" }
      - { action_name: sound_efx, description: "short warning siren" }
  mood_music:
    name: "mood music"
    action_names: [mood_music]
    description: "You can put on background mood music — searchable across many libraries — that plays quietly UNDER the conversation for ambiance (it lowers itself so you can still be heard). Say the vibe or a track. This is background texture, not a front-and-center song."
    examples:
      - { action_name: mood_music, description: "something slow and classical" }
      - { action_name: mood_music, description: "some radio static and hums and pops" }
  jukebox:
    name: "jukebox controls"
    action_names: [jukebox]
    description: "You have an encyclopedic jukebox catalog with most music ever recorded, and it plays front and center. Just say what you want to play (more specific the better) and we'll find it and play it. You can also search the crates without playing anything — say 'search jukebox for XX' and we'll tell you what we found by your next turn."
    examples:
      - { action_name: jukebox, description: "play Closing Time by Tom Waits" }
      - { action_name: jukebox, description: "play some classic punk" }
      - { action_name: jukebox, description: "search jukebox for early Miles Davis" }
  switches:
    name: "switches and triggers"
    action_names: [switch]
    description: "You have a black light and a strobe light you cand trigger and a usb charging hub that can be on or off"
    examples:
      - { action_name: switch, description: "turn my usb charger off" }
      - { action_name: switch, description: "black light on please!" }
